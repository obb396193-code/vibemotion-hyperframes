<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"/><meta name="viewport" content="width=1920,height=1080"/>
<!-- 复制后：把 ../assets/purple/ 改成你放 kit.css/kit.js/fonts 的相对路径 -->
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@hyperframes/core/dist/hyperframe.runtime.iife.js"></script>
<link rel="stylesheet" href="../assets/purple/kit.css"/>
<script src="../assets/purple/kit.js"></script>
<style>
@font-face{font-family:"AliPuHui";src:url("../assets/purple/fonts/AliPuHui.woff2") format("woff2");font-display:swap;}
@font-face{font-family:"Mono";font-weight:500;src:url("../assets/purple/fonts/IBMPlexMono-500.woff2") format("woff2");font-display:swap;}
#title{position:absolute;left:50%;top:42%;transform:translateX(-50%);}#title .chrome{font-size:150px;}
#sub{position:absolute;left:50%;top:62%;transform:translateX(-50%);font-family:"AliPuHui";font-size:52px;color:var(--muted);white-space:nowrap;}
</style></head><body>
<div id="root" data-composition-id="main" data-width="1920" data-height="1080" data-start="0" data-duration="5">
  <div class="scene clip prem" id="s1" data-start="0" data-duration="5" data-track-index="0">
    <div class="k-content">
      <div id="title"><div class="chrome" data-text="你的标题"></div></div>
      <div id="sub">副标题 · <span style="color:var(--vio)">强调词</span></div>
    </div>
  </div>
</div>
<script>
[document.getElementById('s1')].forEach(function(sc){PremKit.mountBG(sc);});
PremKit.chromeAll();
window.__timelines=window.__timelines||{};var tl=gsap.timeline({paused:true});
PremKit.bgDrift(tl,4.4);
PremKit.chromeIn(tl,'#title .chrome',0.3);
PremKit.F(tl,'#sub',{autoAlpha:0,y:24},{autoAlpha:1,y:0,duration:.6,ease:'power3.out'},1.5);
tl.to({},{duration:.6},4.8);
window.__timelines["main"]=tl;
</script></body></html>
