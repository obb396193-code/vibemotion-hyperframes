      #t5-root{
        --paper:#F0EEE6; --ink:#262624; --muted:#6F6E66; --clay:#D97757;
        --f-body:"Hanken Grotesk","Inter",system-ui,sans-serif;
        --f-serif:"Galaxie Copernicus","Newsreader",Georgia,serif;
        position:relative;width:1920px;height:1080px;overflow:hidden;
        background:var(--paper);container-type:size;font-family:var(--f-body);color:var(--ink);
      }
      #t5-root *,#t5-root *::before,#t5-root *::after{box-sizing:border-box;margin:0;padding:0}
      #t5-root::before{content:"";position:absolute;inset:0;z-index:0;pointer-events:none;opacity:.5;
        background:radial-gradient(circle, rgba(38,36,30,.025) 1px, transparent 1px) 0 0/34px 34px}

      /* giant thinking, centered — burst INLINE with a much larger word (logo beside the text) */
      #t5-root .stage{position:absolute;inset:0;z-index:1;display:grid;place-items:center}
      #t5-root .row{display:flex;flex-direction:row;align-items:center;justify-content:center;gap:2.5cqw;transform:scale(0.9)}
      #t5-root .burst{width:14cqw;height:14cqw;display:block;flex:0 0 auto;transform:translateY(-40px)}  /* raised 40px above the text line */
      #t5-root .tk{position:relative;height:13cqw;display:flex;align-items:center;transform:translateY(-40px)}  /* raised to sit inline with the lottie */
      #t5-root .tk .unit{position:relative;height:100%;display:flex;align-items:center;white-space:nowrap;
        font-family:var(--f-serif);font-style:normal;font-weight:700;font-size:9.5cqw;line-height:1;
        background:linear-gradient(100deg,#33312C 0%,#33312C 40%,#C9C5BB 50%,#33312C 60%,#33312C 100%);
        background-size:280% 100%;background-position:140% 0;
        -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent}
