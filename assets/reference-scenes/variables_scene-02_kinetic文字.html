<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=block');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1920px; height: 1080px; overflow: hidden; background: #fff; font-family: 'Inter', sans-serif; }

  #scene-02 {
    position: relative;
    width: 1920px;
    height: 1080px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #fff;
  }

  .dial-line {
    position: absolute;
    display: flex;
    align-items: center;
    font-size: 104px;
    font-weight: 800;
    letter-spacing: -0.03em;
    color: #0a0a0a;
    white-space: nowrap;
  }

  .dial-word {
    font-size: 104px;
    font-weight: 800;
    letter-spacing: -0.03em;
    color: #0a0a0a;
    line-height: 127px;
    white-space: nowrap;
    display: inline-block;
    margin: 0 0.2em;
  }

  .siri-gradient {
    background: linear-gradient(90deg, #FF6B6B, #FF9500, #E879F9, #818CF8, #22D3EE, #FF6B6B);
    background-size: 200% 100%;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .glass-card {
    position: absolute;
    width: 380px;
    height: 675px;
    border-radius: 24px;
    overflow: hidden;
    background: linear-gradient(165deg,
      rgba(0,0,0,0.04) 0%,
      rgba(0,0,0,0.02) 40%,
      rgba(0,0,0,0.01) 100%
    );
    border: 1px solid rgba(0,0,0,0.08);
    box-shadow:
      0 8px 32px rgba(0,0,0,0.06),
      0 2px 8px rgba(0,0,0,0.04),
      inset 0 1px 0 rgba(255,255,255,0.8),
      inset 0 -1px 0 rgba(0,0,0,0.03);
    opacity: 0;
    transform: scale(0.3);
  }

  .glass-card video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 23px;
  }

  .glass-shine {
    position: absolute;
    top: -30%;
    left: -20%;
    width: 140%;
    height: 50%;
    background: linear-gradient(180deg,
      rgba(255,255,255,0.4) 0%,
      rgba(255,255,255,0) 100%
    );
    transform: rotate(-8deg);
    pointer-events: none;
    z-index: 2;
  }
</style>
</head>
<body>
<div id="scene-02" data-composition-id="scene-02" data-width="1920" data-height="1080" data-duration="4">

  <div class="dial-line" id="dial-line">
    <span id="perfect-word">the perfect</span>
    <span class="dial-word" id="center-word">UGC ad</span>
    <span id="video-word" class="siri-gradient">video</span>
  </div>

  <div class="glass-card" id="glass-card">
    <video id="ad-video" data-start="0.51" data-duration="3.49" data-track-index="1" data-volume="0" src="../assets/hook-c.mp4" muted playsinline></video>
    <div class="glass-shine"></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
window.__timelines = window.__timelines || {};
var tl = gsap.timeline({ paused: true });

// Animate siri gradient on "video" continuously
tl.fromTo("#video-word", { backgroundPosition: "0% 50%" }, { backgroundPosition: "200% 50%", duration: 2, ease: "none" }, 0);

// "UGC ad" fades out, "the perfect" and "video" slide apart, card scales up
tl.to("#center-word", { opacity: 0, scale: 0.8, duration: 0.32, ease: "power2.in" }, 0.19);
tl.to("#perfect-word", { x: -400, opacity: 0, duration: 0.45, ease: "power3.in" }, 0.19);
tl.to("#video-word", { x: 400, opacity: 0, duration: 0.45, ease: "power3.in" }, 0.19);
tl.to("#glass-card", { opacity: 1, scale: 1.4, duration: 0.51, ease: "power2.out" }, 0.32);

// Cut the curve exit — card accelerates leftward with blur
tl.to("#glass-card", {
  x: -200, filter: "blur(8px)", duration: 0.33, ease: "power2.in"
}, 4 - 0.33);

window.__timelines["scene-02"] = tl;
</script>
</body>
</html>
