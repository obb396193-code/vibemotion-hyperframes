<style>
  /* fonts: original local woff2 (Git-LFS pointers, not downloaded) replaced by Google Fonts <link> in the template head above */
  #con-root{position:absolute;inset:0;width:1920px;height:1080px;container-type:size;font-family:'Hanken Grotesk',system-ui,sans-serif;background:#F0EFE9;}
  #con-root .win{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:83.3cqw;height:81cqh;background:#1D1F1F;border-radius:1.35cqw;box-shadow:0 2cqw 6cqw -2cqw rgba(20,20,18,.45);overflow:hidden;color:#EFEADD;}

  #con-root .feed{position:absolute;left:3.4cqw;right:3.4cqw;top:6cqw;bottom:16.5cqw;overflow:hidden;}
  #con-root .stack{position:absolute;left:0;right:0;bottom:0;display:flex;flex-direction:column;gap:1.6cqw;}

  #con-root .tool .ok{color:#3CE6AC;}#con-root .tool .dim{color:#6F6E66;}
  #con-root .composer{position:absolute;left:3.4cqw;right:3.4cqw;bottom:3.4cqw;}
  #con-root .inputbar{position:relative;display:flex;align-items:center;background:#2C2C2B;border:1px solid #3a3a38;border-radius:.9cqw;min-height:3.3cqw;padding:.7cqw 1.2cqw;}

  #con-root .orb{width:1.25cqw;height:1.25cqw;border-radius:50%;box-sizing:border-box;border:0.17cqw solid rgba(96,148,214,0.26);border-top-color:#5A9BE6;}

  #con-root .pet{position:absolute;right:3cqw;bottom:100%;width:7.6cqw;height:4.4cqw;pointer-events:none;}
  #con-root .pet video{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;display:block;

  /* terminal permission prompt (faithful Claude Code) */
  #con-root .permit{position:absolute;left:0;right:0;bottom:0;background:#26211E;border:1px solid #D97757;border-radius:.9cqw;padding:.95cqw 1.25cqw;opacity:0;}
  #con-root .permit-head{display:flex;align-items:center;gap:.55cqw;color:#D97757;font-size:1.0cqw;font-weight:600;margin-bottom:.55cqw;}

  #con-root .permit-cmd{font-family:'Spline Sans Mono',monospace;font-size:1.3cqw;color:#EFEADD;}

</style>

<script>
(function(){
  const R=(document.currentScript&&document.currentScript.closest('#con-root'))||document.querySelector('#con-root');
  if(!R||!window.gsap) return;
  const GAP=30.72, CUR=105.6;
  const Q_TXT="Okay cool — how do I do that?";
  const typed=R.querySelector('.typed'),ph=R.querySelector('.ph'),caret=R.querySelector('.caret'),
        stack=R.querySelector('.stack'),q=R.querySelector('.r-q'),a=R.querySelector('.r-a'),
        tool=R.querySelector('.r-tool'),okpart=R.querySelector('.okpart'),
        cursor=R.querySelector('.cursor'),ret=R.querySelector('.ret'),
        inputbar=R.querySelector('.inputbar'),metarow=R.querySelector('.metarow'),
        permit=R.querySelector('.permit'),yes=R.querySelector('.opt.sel'),
        feed=R.querySelector('.feed'),composer=R.querySelector('.composer');
  const rows=[...stack.children]; // [M2, M3, M4, Q, A, TOOL]
  function ctr(el){const rb=R.getBoundingClientRect(),b=el.getBoundingClientRect(),s=(R.offsetWidth||1920)/(rb.width||1);return{x:(b.left+b.width/2-rb.left)*s,y:(b.top+b.height/2-rb.top)*s};}
  const rc=ctr(ret), tipX=rc.x-0.21*CUR, tipY=rc.y-0.14*CUR;        // ↵ send key
  const yc=ctr(yes), yX=yc.x-0.21*CUR, yY=yc.y-0.14*CUR;            // "Yes" option
  // the prompt box grows into the permission card → push the chat up by the extra height
  const PSHIFT=Math.max(0, permit.offsetHeight - (inputbar.offsetHeight + metarow.offsetHeight + 16) + 24);
  window.__timelines=window.__timelines||{};
  const tl=gsap.timeline({paused:true});

  // rest: Q + A + TOOL clipped below; M2+M3+M4 bottom-anchored (== responds end frame)
  const dQ=q.offsetHeight+GAP, dA=a.offsetHeight+GAP, dTool=tool.offsetHeight+GAP;
  gsap.set(stack,{y:dQ+dA+dTool});
  gsap.set([q,a,tool],{opacity:0});
  gsap.set([okpart,permit],{opacity:0});
  gsap.set(ph,{display:'none'});gsap.set(caret,{opacity:1});gsap.set(R.querySelector('.orb'),{transformOrigin:'50% 50%'});

  tl.to(R.querySelector('.orb'),{rotation:360,duration:1.0,ease:'none',repeat:6},0);

  // 1) the user asks how — types the question, taps send
  tl.to(caret,{opacity:0,duration:.5,ease:'steps(1)',repeat:1,yoyo:true},0.15);
  const oq={n:0};
  tl.to(oq,{n:Q_TXT.length,duration:.85,ease:'none',onUpdate(){typed.textContent=Q_TXT.slice(0,Math.round(oq.n));}},0.2);
  tl.fromTo(cursor,{left:tipX-260,top:tipY+150,opacity:0},{left:tipX,top:tipY,opacity:1,duration:.5,ease:'power3.out'},0.7);
  tl.to(cursor,{scale:.84,duration:.1,ease:'power2.in',transformOrigin:'21% 14%'},1.2);
  tl.to(cursor,{scale:1,duration:.2,ease:'power2.out',transformOrigin:'21% 14%'},1.3);
  tl.fromTo(ret,{color:'#6F6E66'},{color:'#D97757',duration:.08},1.25);
  tl.to(ret,{color:'#6F6E66',duration:.25},1.45);
  tl.add(()=>{typed.textContent='';},1.3);
  tl.fromTo(q,{opacity:0},{opacity:1,duration:.4,ease:'power2.out'},1.32);
  tl.to(stack,{y:dA+dTool,duration:.5,ease:'power3.out'},1.32);
  tl.to(rows[0],{opacity:0,duration:.4,ease:'power2.out'},1.32);
  tl.to(cursor,{opacity:0,duration:.3},1.5);

  // 2) quick reply: Claude says it'll connect, M3 fades out the top
  tl.fromTo(a,{opacity:0},{opacity:1,duration:.4,ease:'power3.out'},2.0);
  tl.to(stack,{y:dTool,duration:.5,ease:'power3.out'},2.0);
  tl.to(rows[1],{opacity:0,duration:.4,ease:'power2.out'},2.0);

  // 3) PERMISSION PROMPT — the composer becomes the "Bash command / proceed?" card, chat pushes up
  tl.to([inputbar,metarow],{opacity:0,duration:.25,ease:'power2.in'},2.65);
  tl.fromTo(permit,{opacity:0,y:14},{opacity:1,y:0,duration:.4,ease:'power3.out'},2.8);
  tl.to(stack,{y:dTool-PSHIFT,duration:.4,ease:'power3.out'},2.8);
  // cursor moves to "Yes" and clicks
  tl.fromTo(cursor,{left:yX-220,top:yY+170,opacity:0},{left:yX,top:yY,opacity:1,duration:.55,ease:'power3.out'},3.3);
  tl.to(cursor,{scale:.84,duration:.1,ease:'power2.in',transformOrigin:'21% 14%'},3.95);
  tl.to(cursor,{scale:1,duration:.2,ease:'power2.out',transformOrigin:'21% 14%'},4.05);
  tl.to(yes,{backgroundColor:'rgba(217,119,87,.42)',duration:.1},3.98);
  tl.to(yes,{backgroundColor:'rgba(217,119,87,.16)',duration:.3},4.12);
  tl.to(cursor,{opacity:0,duration:.3},4.25);

  // 4) approved → permit closes, composer returns, the command runs in the feed (M4 fades), result resolves
  tl.to(permit,{opacity:0,duration:.3,ease:'power2.in'},4.35);
  tl.to([inputbar,metarow],{opacity:1,duration:.35,ease:'power2.out'},4.5);
  tl.fromTo(tool,{opacity:0},{opacity:1,duration:.4,ease:'power3.out'},4.5);
  tl.to(stack,{y:0,duration:.5,ease:'power3.out'},4.5);
  tl.to(rows[2],{opacity:0,duration:.4,ease:'power2.out'},4.5);
  tl.fromTo(okpart,{opacity:0},{opacity:1,duration:.35,ease:'power2.out'},5.3);
  // chat fades out, leaving the BARE dark window + chrome, for the seamless cut to fleet
  tl.to([feed,composer],{opacity:0,duration:.4,ease:'power2.in'},5.9);
  tl.to({},{duration:.2},6.6);
  window.__timelines["connect"]=tl;
})();
</script>
