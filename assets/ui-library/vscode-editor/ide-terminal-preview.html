    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        var tl = gsap.timeline({ paused: true });
        var root = document.querySelector('[data-composition-id="cta"]');

        var wrap = root.querySelector(".cta-wrap");
        var typed1 = root.querySelector("#cta-typed-1");
        var cursor1 = root.querySelector("#cta-cursor-1");
        var typed2 = root.querySelector("#cta-typed-2");
        var cursor2 = root.querySelector("#cta-cursor-2");
        var line2 = root.querySelector("#cta-line-2");
        var right = root.querySelector("#cta-right");
        var codeText = root.querySelector("#cta-code-text");
        var codePanel = root.querySelector("#cta-code");
        var status = root.querySelector("#cta-status");
        var ready = root.querySelector("#cta-ready");

        // Scaffold lines
        var sl1 = root.querySelector("#sl-1");
        var sl2 = root.querySelector("#sl-2");
        var sl3 = root.querySelector("#sl-3");
        var sl4 = root.querySelector("#sl-4");
        var sl5 = root.querySelector("#sl-5");
        var scaffoldLines = [sl1, sl2, sl3, sl4, sl5];

        // Mini comp elements
        var miniTitle = root.querySelector("#mini-title");
        var miniB1 = root.querySelector("#mini-b1");
        var miniB2 = root.querySelector("#mini-b2");
        var miniB3 = root.querySelector("#mini-b3");
        var miniL1 = root.querySelector("#mini-l1");
        var miniL2 = root.querySelector("#mini-l2");
        var miniCirc = root.querySelector("#mini-circ");
        var miniTlFill = root.querySelector("#mini-tl-fill");

        // Strings
        var CMD_1 = "npx hyperframes init";
        var CMD_2 = "a product intro with kinetic typography";

        // Code lines that "stream in" during build
        var CODE_LINES = [
          '<div data-composition-id="intro"',
          '  data-width="1920"',
          '  data-height="1080"',
          '  data-duration="10">',
          '',
          '  <div class="title">',
          '    Kinetic Typography',
          '  </div>',
          '',
          '  <script>',
          '    const tl = gsap.timeline();',
          '    tl.from(".title", {',
          '      opacity: 0, y: 40,',
          '      duration: 0.8',
          '    });',
          '  <\/script>',
          '</div>'
        ];

        // ═══ Initial states ═══
        gsap.set(wrap, { y: 150, filter: "blur(30px)" });
        gsap.set(cursor2, { opacity: 0 });
        gsap.set(line2, { opacity: 0 });
        gsap.set(right, { x: 400, opacity: 0 });
        gsap.set(ready, { opacity: 0, y: 8 });

        // Scaffold lines hidden
        scaffoldLines.forEach(function (el) { gsap.set(el, { opacity: 0, y: 6 }); });

        // Mini comp elements hidden
        gsap.set(miniTitle, { opacity: 0, y: 30 });
        gsap.set(miniB1, { opacity: 0, scale: 0.6 });
        gsap.set(miniB2, { opacity: 0, x: 60 });
        gsap.set(miniB3, { opacity: 0, y: 20 });
        gsap.set(miniL1, { scaleX: 0, transformOrigin: "left center" });
        gsap.set(miniL2, { scaleX: 0, transformOrigin: "left center" });
        gsap.set(miniCirc, { opacity: 0, scale: 0.3 });
        gsap.set(miniTlFill, { width: "0%" });
        gsap.set(codePanel, { opacity: 0 });

        // ═══ Phase 0: Cut-the-curve entry (0 → 1.0s) ═══
        tl.to(wrap, {
          y: 0, filter: "blur(0px)",
          duration: 1.0, ease: "power2.out"
        }, 0);

        // ═══ Phase 1: Type "npx hyperframes init" (0.3 → 1.3s) ═══
        // VO: "Give your agent the skill." — 0.00-1.85
        var type1Start = 0.3;
        var type1Dur = 0.9;
        var char1Delay = type1Dur / CMD_1.length;

        // Cursor blink during typing
        tl.to(cursor1, { opacity: 0, duration: 0.12, yoyo: true, repeat: 5, ease: "steps(1)" }, 0.3);

        for (var i = 0; i < CMD_1.length; i++) {
          (function (idx) {
            tl.call(function () {
              typed1.textContent = CMD_1.substring(0, idx + 1);
            }, null, type1Start + idx * char1Delay);
          })(i);
        }

        // Hide cursor1 after typing done
        tl.to(cursor1, { opacity: 0, duration: 0.1 }, 1.25);

        // ═══ Phase 1b: Scaffold output (1.3 → 2.0s) ═══
        tl.to(sl1, { opacity: 1, y: 0, duration: 0.15, ease: "power2.out" }, 1.3);
        tl.to(sl2, { opacity: 1, y: 0, duration: 0.12, ease: "power2.out" }, 1.42);
        tl.to(sl3, { opacity: 1, y: 0, duration: 0.12, ease: "power2.out" }, 1.50);
        tl.to(sl4, { opacity: 1, y: 0, duration: 0.12, ease: "power2.out" }, 1.58);
        tl.to(sl5, { opacity: 1, y: 0, duration: 0.2, ease: "back.out(1.4)" }, 1.72);

        // ═══ Phase 2: Type prompt (2.1 → 3.3s) ═══
        // VO: "Tell it what to make." — 2.12-3.33
        tl.to(line2, { opacity: 1, duration: 0.15, ease: "power2.out" }, 2.05);
        tl.to(cursor2, { opacity: 1, duration: 0.1 }, 2.05);

        var type2Start = 2.15;
        var type2Dur = 1.1;
        var char2Delay = type2Dur / CMD_2.length;

        // Cursor blink during typing
        tl.to(cursor2, { opacity: 0, duration: 0.12, yoyo: true, repeat: 7, ease: "steps(1)" }, 2.15);

        for (var j = 0; j < CMD_2.length; j++) {
          (function (idx) {
            tl.call(function () {
              typed2.textContent = CMD_2.substring(0, idx + 1);
            }, null, type2Start + idx * char2Delay);
          })(j);
        }

        // ═══ Phase 3: Preview build (3.3 → 5.0s) ═══
        // VO: "Watch it build." — 3.40-5.20

        // Right panel slides in
        tl.to(right, {
          x: 0, opacity: 1,
          duration: 0.5, ease: "power2.out"
        }, 3.3);

        // Code panel fades in
        tl.to(codePanel, { opacity: 1, duration: 0.3, ease: "power2.out" }, 3.5);

        // Stream code lines in
        var codeStart = 3.55;
        var lineDelay = 0.06;
        for (var k = 0; k < CODE_LINES.length; k++) {
          (function (idx) {
            tl.call(function () {
              var lines = CODE_LINES.slice(0, idx + 1).join("\n");
              codeText.textContent = lines;
            }, null, codeStart + idx * lineDelay);
          })(k);
        }

        // Scroll code up as it fills
        tl.to(codeText, { y: -40, duration: 0.8, ease: "none" }, 4.0);

        // Mini composition assembles
        tl.to(miniTitle, {
          opacity: 1, y: 0,
          duration: 0.25, ease: "power2.out"
        }, 3.6);

        tl.to(miniB1, {
          opacity: 1, scale: 1,
          duration: 0.2, ease: "back.out(1.5)"
        }, 3.75);
        tl.to(miniB2, {
          opacity: 1, x: 0,
          duration: 0.2, ease: "power2.out"
        }, 3.85);

        tl.to(miniL1, { scaleX: 1, duration: 0.2, ease: "power2.out" }, 3.9);
        tl.to(miniL2, { scaleX: 1, duration: 0.2, ease: "power2.out" }, 3.95);

        tl.to(miniB3, {
          opacity: 1, y: 0,
          duration: 0.2, ease: "power2.out"
        }, 4.0);
        tl.to(miniCirc, {
          opacity: 1, scale: 1,
          duration: 0.25, ease: "back.out(1.5)"
        }, 4.05);

        tl.to(miniTlFill, {
          width: "100%",
          duration: 0.6, ease: "power1.out"
        }, 3.8);

        // Status → Ready
        tl.call(function () {
          status.textContent = "Ready";
          status.style.color = "#5a8a6e";
        }, null, 4.5);

        tl.to(ready, {
          opacity: 1, y: 0,
          duration: 0.25, ease: "back.out(1.5)"
        }, 4.5);

        // Gentle settle
        tl.to(miniB1, { y: -4, duration: 0.4, ease: "sine.inOut", yoyo: true, repeat: 1 }, 4.6);

        // ═══ Phase 4: Zoom-out exit (4.95 → 5.28s) ═══
        tl.to(wrap, {
          scale: 0.85, filter: "blur(20px)", opacity: 0.3,
          duration: 0.33, ease: "power2.in"
        }, 4.95);

        window.__timelines["cta"] = tl;
      })();
    </script>
  </div>
</template>
