<style>

<script>
(function(){
  const R=(document.currentScript&&document.currentScript.closest('#fc-root'))||document.querySelector('#fc-root');
  if(!R||!window.gsap) return;
  const q=(s)=>R.querySelector(s), qa=(s)=>Array.from(R.querySelectorAll(s));
  window.__timelines=window.__timelines||{};
  const tl=gsap.timeline({paused:true});
  const inner=gsap.timeline();   // authored ~4.8s, played back compressed

  gsap.set(q('.pwin'),{opacity:0,scale:.62,y:10});
  gsap.set(q('#fc-pfill'),{scaleX:0.05});
  gsap.set(q('#fc-pknob'),{left:'5%'});
  gsap.set(q('.codeview'),{opacity:0});
  gsap.set(q('#fc-band'),{opacity:0});

  // TITLE typewriter
  const TITLE="SHOW YOUR CODE";
  const tt=q('#fc-ttext'), tc=q('#fc-tcaret');
  tt.textContent=''; gsap.set(tc,{opacity:1});
  const o={n:0};
  inner.to(o,{n:TITLE.length,duration:1.15,ease:'none',onUpdate(){tt.textContent=TITLE.slice(0,Math.round(o.n));}},0.3);
  inner.to(tc,{opacity:0,duration:.4,ease:'steps(1)',repeat:9,yoyo:true},0.3);
  inner.to(tc,{opacity:0,duration:.3,ease:'power2.in'},4.5);

  // player opens, code reveals
  inner.fromTo(q('.pwin'),{opacity:0,scale:.62,y:10},{opacity:1,scale:1,y:0,duration:.6,ease:'power3.out'},0.15);
  inner.to(q('.codeview'),{opacity:1,duration:.45,ease:'power2.out'},1.0);

  // scrubber inches forward (scene 1 of 6)
  inner.to(q('#fc-pfill'),{scaleX:0.11,duration:3.2,ease:'none'},1.4);
  inner.to(q('#fc-pknob'),{left:'11%',duration:3.2,ease:'none'},1.4);
  const t2={t:2};
  inner.to(t2,{t:5,duration:3.2,ease:'none',onUpdate(){q('#fc-ptime').textContent='0:'+String(Math.floor(t2.t)).padStart(2,'0')+' / 0:32';}},1.4);

  // highlight the truncation-fix lines (key)
  inner.set(q('#fc-band'),{top:'622px'},2.4);   // sits over lines 14–16
  inner.to(qa('.cl:not(.key)'),{opacity:.32,duration:.4,ease:'power2.out'},2.45);
  inner.to(q('#fc-band'),{opacity:1,duration:.4,ease:'power2.out'},2.5);
  inner.to({},{duration:.6},4.6);

  inner.timeScale(2.0);   // compressed: ~4.8s authored → ~2.4s
  tl.add(inner,0);
  window.__timelines["feature-code"]=tl;
})();
