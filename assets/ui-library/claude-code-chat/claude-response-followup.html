    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=Newsreader:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Spline+Sans+Mono:wght@400;500&display=block" rel="stylesheet">
  <div id="f4-root" data-composition-id="followup-type" data-width="1920" data-height="1080" data-duration="6.0">
    <style>
      /* local fonts (captured woff2, font-display:block) */
      /* fonts: original local woff2 (Git-LFS pointers, not downloaded) replaced by Google Fonts <link> in the template head above */

      #f4-root{
        --paper:#F0EEE6; --ink:#262624; --muted:#6F6E66; --clay:#D97757; --clay-text:#A8472A;
        --hairline:#DCD8CC; --hairline-soft:#E7E3D6; --on-accent:#FBF7F0;
        --f-body:"Hanken Grotesk","Inter",system-ui,sans-serif;
        --f-serif:"Newsreader",Georgia,serif;
        position:relative;width:1920px;height:1080px;overflow:hidden;
        background:var(--paper);container-type:size;color:var(--ink);font-family:var(--f-body);
      }
      #f4-root *,#f4-root *::before,#f4-root *::after{box-sizing:border-box;margin:0;padding:0}
      #f4-root::before{content:"";position:absolute;inset:0;z-index:0;pointer-events:none;opacity:.5;
        background:radial-gradient(circle, rgba(38,36,30,.025) 1px, transparent 1px) 0 0/34px 34px}

      #f4-root .scroll{position:absolute;left:0;top:0;width:100%;height:100%;z-index:1;will-change:transform}
      #f4-root .msg{position:absolute;right:8%;top:9%;max-width:60cqw;
        background:#EBE6D8;border:1px solid var(--hairline-soft);border-radius:1.8cqw;
        padding:1.4cqw 2cqw;font:500 2.4cqw/1.4 var(--f-body);color:var(--ink)}
      #f4-root .resp{position:absolute;left:8.5%;top:24%;width:66cqw;
        font-family:var(--f-serif);font-weight:400;font-size:2.4cqw;line-height:1.58;color:#2B2926;letter-spacing:.002em}
      #f4-root .resp > *:first-child{margin-top:0}
      #f4-root .resp p{margin:0 0 1.7cqw}
      #f4-root .resp h2{font-family:var(--f-body);font-weight:700;font-size:3.05cqw;line-height:1.15;letter-spacing:-.015em;color:var(--ink);margin:3cqw 0 1.2cqw}
      #f4-root .resp h3{font-family:var(--f-body);font-weight:700;font-size:2.3cqw;line-height:1.2;letter-spacing:-.01em;color:var(--ink);margin:1.9cqw 0 .7cqw}
      #f4-root .resp ul{list-style:none;margin:0 0 1.8cqw;padding:0}
      #f4-root .resp ol{list-style:decimal;margin:0 0 1.8cqw;padding-left:3.6cqw}
      #f4-root .resp li{position:relative;margin:0 0 1.1cqw}
      #f4-root .resp ul li{padding-left:3cqw}
      #f4-root .resp ol li{padding-left:.5cqw}
      #f4-root .resp ul li::before{content:"";position:absolute;left:.75cqw;top:1.5cqw;width:.66cqw;height:.66cqw;border-radius:50%;background:var(--muted)}
      #f4-root .resp strong{font-weight:600;color:var(--ink)}
      #f4-root .resp em{font-style:italic}

      #f4-root .fade{position:absolute;left:0;right:0;bottom:0;height:22%;z-index:2;pointer-events:none;
        background:linear-gradient(to top, var(--paper) 38%, rgba(240,238,230,0))}
      #f4-root .composer{position:absolute;left:50%;top:87%;transform:translate(-50%,-50%);z-index:3;
        width:84cqw;height:8.5cqw;background:#FCFBF7;border:1.5px solid var(--hairline-soft);
        border-radius:2.4cqw;box-shadow:0 2px 6px rgba(38,38,36,.05), 0 34px 80px -30px rgba(38,38,36,.32)}
      #f4-root .composer .ph{position:absolute;left:3.4cqw;top:50%;transform:translateY(-50%);
        font:500 2.7cqw/1 var(--f-body);color:#9b988f;letter-spacing:-.01em;white-space:nowrap}
      /* typed message — two clip-reveal lines (seek-safe), top-aligned, caret rides each line */
      #f4-root .typearea{position:absolute;left:3.4cqw;right:3.4cqw;top:2.5cqw;display:flex;flex-direction:column;gap:.5cqw}
      #f4-root .tline{display:inline-flex;align-items:center;height:3.7cqw}
      #f4-root .tw{display:inline-block;overflow-x:clip;overflow-y:visible;white-space:nowrap;width:0}
      #f4-root .ttext{display:inline-block;font-size:2.7cqw;font-weight:500;color:var(--ink);letter-spacing:-.01em;white-space:nowrap;line-height:1}
      #f4-root .caret{flex:0 0 auto;width:.2cqw;height:2.8cqw;background:var(--clay);margin-left:.06em;border-radius:.06cqw;opacity:0}
      #f4-root .composer .send{position:absolute;right:3.4cqw;bottom:1.6cqw;
        width:5.2cqw;height:5.2cqw;border-radius:50%;background:var(--clay);display:grid;place-items:center}
      #f4-root .composer .send svg{width:2.7cqw;height:2.7cqw;stroke:var(--on-accent);stroke-width:2.4;fill:none;stroke-linecap:round;stroke-linejoin:round}

      #f4-root .cursor{position:absolute;left:50%;top:116%;width:7cqw;height:7cqw;z-index:30;filter:drop-shadow(0 4px 6px rgba(0,0,0,.3));pointer-events:none}
    </style>

    <div class="scroll" id="scroll">
      <div class="msg">Can you give your projections for TSLA in 2026?</div>
      <div class="resp" id="resp"><p>Good question — with one caveat up front: <strong>I can't predict where any stock will actually trade,</strong> and none of this is investment advice. But you asked for projections, so let's go properly deep.</p>

        <h2>The big picture</h2>
        <p>Tesla in 2026 is really four businesses wearing one ticker: a maturing auto company, a fast-growing energy company, an early-stage autonomy bet, and an optionality-laden robotics moonshot. How you weight those four is the entire debate.</p>

        <h2>What actually drives the stock</h2>
        <ul>
          <li><strong>Auto margins and volume.</strong> After years of price cuts, the question is whether deliveries reaccelerate without eroding gross margin further. A refreshed lineup and a genuinely sub-$30k model would change the math.</li>
          <li><strong>Energy and storage.</strong> The fastest-growing, highest-margin segment — and a real earnings driver if deployments keep compounding.</li>
          <li><strong>Autonomy (FSD + robotaxi).</strong> The genuine wildcard. Credible driverless traction re-rates the stock; another year of "next quarter" does not.</li>
          <li><strong>Optimus and robotics.</strong> Pure optionality today, but the part of the story that justifies the most aggressive bull cases.</li>
          <li><strong>Regulatory credits.</strong> A high-margin tailwind that's slowly fading — worth watching as it rolls off.</li>
          <li><strong>China.</strong> Both the biggest growth lever and the biggest competitive threat, depending on the quarter.</li>
          <li><strong>Capital allocation.</strong> Buybacks, capex discipline, and how much they spend chasing the moonshots.</li>
        </ul>

        <h2>Scenarios</h2>
        <h3>Bull case</h3>
        <ul>
          <li>FSD starts converting to real, recurring revenue.</li>
          <li>Energy compounds faster than the Street models.</li>
          <li>Auto margins stabilize and the multiple expands on the AI/robotics narrative.</li>
        </ul>
        <h3>Base case</h3>
        <ul>
          <li>Steady deliveries, strong energy growth, autonomy still "coming."</li>
          <li>The stock is range-bound but drifts higher on energy and sentiment.</li>
        </ul>
        <h3>Bear case</h3>
        <ul>
          <li>Margin pressure persists and autonomy slips again.</li>
          <li>Credits fade, competition bites, and the multiple compresses hard.</li>
        </ul>

        <h2>Catalysts to watch (roughly in order)</h2>
        <ol>
          <li>Quarterly delivery numbers and the gross-margin trend.</li>
          <li>Any concrete, metered robotaxi expansion beyond a pilot.</li>
          <li>The next-gen, lower-cost vehicle actually shipping.</li>
          <li>Energy storage deployment and backlog updates.</li>
          <li>Optimus moving from demo to any real deployment.</li>
        </ol>

        <h2>The risks I'd actually worry about</h2>
        <ul>
          <li>Demand softness forcing yet another round of price cuts.</li>
          <li>Autonomy timelines slipping again — the most expensive risk.</li>
          <li>Key-person and governance overhang.</li>
          <li>Chinese competition on both price and technology.</li>
        </ul>

        <h2>How I'd frame valuation</h2>
        <p>Almost none of the value sits in the cars-sold-this-year number. It sits in the terminal value of autonomy and energy — which is exactly why the credible range is so wide.</p>
        <ul>
          <li>On near-term earnings alone, the stock looks expensive.</li>
          <li>On a successful-autonomy scenario, it looks cheap.</li>
          <li>Both can be "true" at once — that's the whole game.</li>
        </ul>

        <h2>What I'd track week to week</h2>
        <ul>
          <li>Gross margin <em>excluding</em> regulatory credits.</li>
          <li>Energy deployment run-rate.</li>
          <li>Any real driverless miles — not demos.</li>
        </ul>

        <h2>Bottom line</h2>
        <p><strong>By 2026, Tesla is less a car company than a bet on autonomy and energy.</strong> Frame the report around those drivers rather than a single price target — the range of credible outcomes is genuinely enormous.</p>
        <p>And honestly? Anyone quoting you a precise 2026 price target is guessing with confidence. I'd rather give you the framework and let the data update it.</p>
        <p>Want me to turn this into a one-page brief with charts, or go deeper on any single driver?</p></div>
    </div>

    <div class="fade"></div>
    <div class="composer" id="composer">
      <span class="ph" id="ph">Write a message...</span>
      <div class="typearea" id="typearea">
        <div class="tline"><span class="tw" id="tw1"><span class="ttext" id="t1">Ummm... thank you! Would you mind making this</span></span><span class="caret" id="c1"></span></div>
        <div class="tline"><span class="tw" id="tw2"><span class="ttext" id="t2">into a video with HyperFrames?</span></span><span class="caret" id="c2"></span></div>
      </div>

    <svg class="cursor" id="cursor" viewBox="0 0 28 28">
      <path d="M6 4 L6 23 L11 18 L14.5 25 L17.5 23.6 L14 17 L21 17 Z" fill="#1c1c1c" stroke="#ffffff" stroke-width="1.4" stroke-linejoin="round"/>
    </svg>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/CustomEase.min.js"></script>
    <script>
    window.__timelines = window.__timelines || {};
    (async function(){
      if(document.fonts && document.fonts.ready){ try{ await document.fonts.ready; }catch(e){} }
      // build after fonts.ready so offsetWidth metrics are final → widths are baked straight into the
      // reveals (no tl.recent()/tl.invalidate(), which the render-time GSAP batching proxy can't run)
      const root=document.querySelector('[data-composition-id="followup-type"]');
      const plate=root, scroll=root.querySelector('#scroll'), resp=root.querySelector('#resp');
      const composer=root.querySelector('#composer'), ph=root.querySelector('#ph'), cursor=root.querySelector('#cursor'), send=root.querySelector('#send');
      const tw1=root.querySelector('#tw1'), tw2=root.querySelector('#tw2');
      const t1=root.querySelector('#t1'), t2=root.querySelector('#t2');
      const c1=root.querySelector('#c1'), c2=root.querySelector('#c2');

      const L1=t1.textContent.length, L2=t2.textContent.length;
      const PUSH=6.5*19.2;   // composer grows 6.5cqw; push the conversation up by the same so it reacts

      gsap.set([c1,c2],{opacity:0});
      gsap.set(cursor,{transformOrigin:'21% 14%'});

      const E='power3.out';
      // smooth cubic-bezier for the box morph (gentle start + end)
      if(window.CustomEase){ gsap.registerPlugin(CustomEase); CustomEase.create('growBez','0.6, 0, 0.2, 1'); }
      const GROW_EASE = window.CustomEase ? 'growBez' : 'power2.inOut';
      // timeline-level onUpdate via creation vars (NOT tl.eventCallback — unsupported by the render
      // batching proxy). It closes over GROW_AT/GROW_DUR/growEaseFn/maxFrozen declared below; all are
      // initialized by the time the timeline is first seeked/played, so the closure is safe.
      const tl=gsap.timeline({paused:true,defaults:{ease:E},onUpdate:()=>{
        const t=tl.time();
        let p=0; if(t>GROW_AT) p=Math.min(1,(t-GROW_AT)/GROW_DUR);
        gsap.set(scroll,{y:-(maxFrozen+PUSH*growEaseFn(p))});   // cached max → no per-frame reflow pop
      }});

      // measure where response-scroll ended SYNCHRONOUSLY so the scroll set is born at the bottom
      // (no stale y:0 → no 3→4 top-flash); refined again on fonts.ready. visibility:hidden retains layout.
      // transform-independent (offsetTop/offsetHeight are layout px, NOT affected by our own scroll
      // translateY) → safe to call every frame in onUpdate with no feedback loop.
      function measureMax(){
        const bottom = resp.offsetTop + resp.offsetHeight;
        return Math.max(0, bottom - (0.87*1080 - 0.05*1080));
      }
      // freeze the conversation at the bottom. CACHE the max — do NOT re-measure live every frame:
      // re-reading offsetHeight on the frame the section flips visible reflows transiently → a 1–2
      // frame scroll pop (the 3→4 "top of chat" flash). Measured once now (visibility:hidden retains
      // layout) and refreshed on fonts.ready when webfont metrics are final.
      let maxFrozen = measureMax();
      gsap.set(scroll,{y:-maxFrozen});

      // ── the cursor comes back, up from the bottom, to the composer ──
      tl.fromTo(cursor,{left:'13%',top:'116%'},{left:'13%',top:'85%',duration:.7,ease:E},0.0);
      // click the prompt box — ONLY the cursor taps; the box does NOT react (no scale-down)
      tl.to(cursor,{scale:.84,duration:.1,ease:'power2.in'},0.8);
      tl.to(cursor,{scale:1,duration:.22,ease:'power2.out'},0.9);
      // placeholder clears on click; cursor drifts offscreen
      tl.to(ph,{opacity:0,duration:.2},0.85);
      tl.to(cursor,{top:'116%',duration:.55,ease:E},1.05);

      // ── type line 1 in the THIN single-line box; it only grows once the text WRAPS to line 2 ──
      const start1=1.4, TYPE1=L1*0.04, TYPE2=L2*0.04;   // 1.25× faster typing
      tl.set(c1,{opacity:1},start1);
      tl.to(tw1,{width:t1.offsetWidth,duration:TYPE1,ease:`steps(${L1})`},start1);
      const end1=start1+TYPE1;
      tl.set(c1,{opacity:0},end1);
      // WRAP → now grow the input upward (bottom pinned) + push the conversation up, right as line 2 begins
      // start the morph ~0.5s earlier (overlaps line 1's tail) with a longer cubic-bezier ease so it
      // has a smooth start + end and is essentially open by the time line 2 begins (beats the 2nd line)
      tl.to(composer,{top:'81.2%',height:'15cqw',duration:.65,ease:GROW_EASE},end1-0.5);
      // (scroll is driven by the onUpdate below — measured live — not a tween, so render is always correct)
      tl.set(c2,{opacity:1},end1+0.04);
      tl.to(tw2,{width:t2.offsetWidth,duration:TYPE2,ease:`steps(${L2})`},end1+0.04);
      const end2=end1+0.04+TYPE2;
      // caret blinks while the cursor comes back down to the send button
      tl.to(c2,{opacity:0,duration:.5,repeat:2,yoyo:true,ease:'steps(1)'},end2);
      tl.fromTo(cursor,{left:'86%',top:'116%'},{left:'86%',top:'86.5%',duration:.55,ease:E},end2+0.25);
      // click SEND — cursor tap + button press (forward depth)
      const sendT=end2+1.05;
      tl.set(c2,{opacity:0},sendT-0.05);
      tl.to(cursor,{scale:.84,duration:.1,ease:'power2.in'},sendT);
      tl.to(cursor,{scale:1,duration:.22,ease:'power2.out'},sendT+0.1);
      tl.to(send,{scale:.88,duration:.09,ease:'power2.in'},sendT).to(send,{scale:1,duration:.26,ease:'power2.out'},sendT+0.09);
      // hold the sent state — the root timeline plays the inverse zoom-through out of this scene
      tl.to(composer,{opacity:1,duration:.4},sendT+0.5);

      // measure: freeze scroll to match response-scroll's end + set clip widths. Re-run on fonts.ready
      // so webfont metrics are final (otherwise the typed lines clip a few chars short).
      // drive the conversation scroll from onUpdate (FIRES in render, measured live each frame) so the
      // frozen-bottom position is always correct — even though offsetHeight is unmeasurable until the
      // comp is active. This is what fixes the 3→4 top-flash glitch.
      // consumed by the timeline-level onUpdate defined at creation (above). maxFrozen + offsetWidths
      // were measured after fonts.ready, so nothing needs a later re-measure pass.
      const GROW_AT=end1-0.5, GROW_DUR=0.65, growEaseFn=gsap.parseEase(GROW_EASE);

      window.__timelines["followup-type"]=tl;
      const q=new URLSearchParams(location.search);
      if(q.has('t')) tl.seek(parseFloat(q.get('t'))||0);
      else if(q.get('dev')==='1') tl.play();
    })();
    </script>
  </div>
</template>
