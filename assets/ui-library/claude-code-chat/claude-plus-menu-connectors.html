      #cm-root .app.orb img{width:100%;height:100%;display:block}

    const MENU=[{ic:'paperclip',lbl:'Add files or photos',sc:'⌘U'},{ic:'tray',lbl:'Add to project',chev:1},{div:1},{ic:'scroll',lbl:'Skills',chev:1},{ic:'grid',lbl:'Connectors',chev:1,id:'connectors'},{ic:'plug',lbl:'Plugins',chev:1},{div:1},{ic:'signpost',lbl:'Ask HeyGen'},{ic:'research',lbl:'Research'},{ic:'globe',lbl:'Web search',check:1},{ic:'feather',lbl:'Use style',chev:1}];
    const CONN=[{orb:1,lbl:'Hyperframes',id:'hyper'},{div:1},{ic:'briefcase',lbl:'Manage connectors'},{ic:'plus',lbl:'Add connector'},{ic:'search',lbl:'Tool access',sub:'Load tools when needed',chev:1}];

    function rowsMenu(){return MENU.map(r=>{if(r.div)return`<div class="divider"></div>`;let tr=r.sc?`<span class="sc">${r.sc}</span>`:r.check?`<span class="tr check">${I.check}</span>`:r.chev?`<span class="tr">${I.chev}</span>`:'';return`<div class="row" data-id="${r.id||''}"><span class="ic">${I[r.ic]}</span><span class="lbl">${r.lbl}</span>${tr}</div>`;}).join('');}
    function rowsConn(){return CONN.map(r=>{if(r.div)return`<div class="divider"></div>`;if(r.orb)return`<div class="row" data-id="${r.id||''}">${ORB}<span class="lbl">${r.lbl}</span><span class="toggle" data-toggle="${r.id||''}"><span class="knob"></span></span></div>`;let tr=r.chev?`<span class="tr">${I.chev}</span>`:'';let lbl=r.sub?`<span class="lbl">${r.lbl}<span class="sub">${r.sub}</span></span>`:`<span class="lbl">${r.lbl}</span>`;return`<div class="row"><span class="ic">${I[r.ic]}</span>${lbl}${tr}</div>`;}).join('');}
    root.querySelector('#lmenu').innerHTML=rowsMenu();
    root.querySelector('#lconn').innerHTML=rowsConn();

    const box=root.querySelector('#box'),cursor=root.querySelector('#cursor');

    const Lp=root.querySelector('#lplus'),Lm=root.querySelector('#lmenu'),Lc=root.querySelector('#lconn'),Lb=root.querySelector('#lcomposer');
    // split the placeholder into word spans for the rolling-bounce reveal
    const ph=Lb.querySelector('.ph');
    ph.innerHTML=ph.textContent.trim().split(' ').map(w=>`<span class="w">${w}</span>`).join(' ');
    const phWords=ph.querySelectorAll('.w');
    const hyTog=Lc.querySelector('[data-toggle="hyper"]'),hyKnob=hyTog.querySelector('.knob');
    const rowConnectors=Lm.querySelector('[data-id="connectors"]'),rowHyper=Lc.querySelector('[data-id="hyper"]');

    // start as a BARE + glyph — small, no circle chrome (scales in, revealed on hover)
    gsap.set(box,{xPercent:-50,yPercent:-50,width:'12cqw',height:'12cqw',borderRadius:'6cqw',
      backgroundColor:'rgba(250,249,245,0)',borderColor:'rgba(220,216,204,0)',
      boxShadow:'0 4px 12px rgba(38,38,36,0), 0 48px 110px -40px rgba(38,38,36,0)',opacity:0,scale:0.35});
    gsap.set([Lm,Lc,Lb],{opacity:0});gsap.set(Lp,{opacity:1});
    // placeholder words start hidden + below (revealed by the rolling-bounce beat)
    gsap.set(phWords,{opacity:0,y:16});

    const E='power3.out';
    const tl=gsap.timeline({paused:true,defaults:{ease:E}});
    // ENTRY: the bare + scales in toward (but not quite) full — leaves room for the hover expansion
    tl.to(box,{opacity:1,duration:.3},0.05);
    tl.to(box,{scale:0.8,duration:.95,ease:E},0.05);
    // cursor enters STRAIGHT UP the y-axis to its final click position (no diagonal/fragmented motion)
    tl.fromTo(cursor,{left:'47%',top:'115%'},{left:'47%',top:'51%',duration:.92,ease:E},0.3);  // tip rests on the + glyph
    // REVEAL (hover): the circle dynamically EXPANDS into place — final scale + chrome grow together
    tl.to(box,{scale:1,duration:.55,ease:'expo.out'},1.02);
    tl.to(box,{backgroundColor:'#FAF9F5',borderColor:'#DCD8CC',
      boxShadow:'0 4px 12px rgba(38,38,36,.05), 0 48px 110px -40px rgba(38,38,36,.4)',duration:.5,ease:'power2.out'},1.04);
    // CLICK — the + pill is the ONE button that gets the dark click response: grayer fill + forward depth, then settles. Cursor taps in sync.
    tl.to(box,{scale:1.07,backgroundColor:'#E7E2D6',borderColor:'#CFC9BA',
      boxShadow:'0 12px 30px rgba(38,38,36,.12), 0 66px 150px -38px rgba(38,38,36,.52)',
      duration:.12,ease:'power2.out',overwrite:'auto'},1.6);
    tl.to(box,{scale:1,backgroundColor:'#FAF9F5',borderColor:'#DCD8CC',
      boxShadow:'0 4px 12px rgba(38,38,36,.05), 0 48px 110px -40px rgba(38,38,36,.4)',
      duration:.18,ease:'power2.inOut',overwrite:'auto'},1.72);
    tl.to(cursor,{scale:0.84,duration:.1,ease:'power2.in',transformOrigin:'21% 14%'},1.6);
    tl.to(cursor,{scale:1,duration:.22,ease:'power2.out',transformOrigin:'21% 14%'},1.7);
    // MORPH 1: + → menu
    tl.to(box,{width:'42cqw',height:'51.4cqw',borderRadius:'1.6cqw',backgroundColor:'#FFFFFF',borderColor:'#ECEAE3',duration:.58},1.9);
    tl.to(Lp,{opacity:0,duration:.22},1.9);
    tl.to(Lm,{opacity:1,duration:.34},2.15);
    // cursor → Connectors row, highlight (tweened bg → seek-accurate)
    tl.to(cursor,{left:'45%',top:'41%',duration:.5},2.6);
    // fade the hover highlight in from the SAME hue at 0 alpha (starting from transparent-black would
    // interpolate through a dark gray mid-tween — that was the "dark click flash")
    tl.fromTo(rowConnectors,{backgroundColor:'rgba(243,241,235,0)'},{backgroundColor:'rgba(243,241,235,1)',duration:.14},2.93);
    // cursor TAPS the Connectors tile (cursor-only tap; no dark react — that's the +'s alone)
    tl.to(cursor,{scale:0.84,duration:.1,ease:'power2.in',transformOrigin:'21% 14%'},3.1);
    tl.to(cursor,{scale:1,duration:.22,ease:'power2.out',transformOrigin:'21% 14%'},3.2);
    // MORPH 2: menu → connector card (opens on the click)
    tl.to(box,{width:'58cqw',height:'42cqw',duration:.55},3.3);
    tl.to(Lm,{opacity:0,duration:.26},3.3);
    tl.to(Lc,{opacity:1,duration:.32},3.52);
    // cursor straight up to the Hyperframes toggle
    tl.to(cursor,{left:'71.5%',top:'23%',duration:.6,ease:E},3.7);
    // row highlights as the cursor arrives
    tl.fromTo(rowHyper,{backgroundColor:'rgba(243,241,235,0)'},{backgroundColor:'rgba(243,241,235,1)',duration:.16},4.2);
    // cursor TAPS the toggle (same tap as the +) — no darker button-shader react
    tl.to(cursor,{scale:0.84,duration:.1,ease:'power2.in',transformOrigin:'21% 14%'},4.3);
    tl.to(cursor,{scale:1,duration:.22,ease:'power2.out',transformOrigin:'21% 14%'},4.4);
    // flip the toggle ON
    tl.to(hyTog,{backgroundColor:'#2D6DF6',duration:.28},4.37);
    tl.to(hyKnob,{x:'3cqw',duration:.28},4.37);
    tl.to(rowHyper,{backgroundColor:'rgba(243,241,235,0)',duration:.22},4.85);
    // MORPH 3: connector card → prompt box; cursor stays visible, drifts just below the landed box
    tl.to(cursor,{left:'50%',top:'73%',duration:.62,ease:E},4.95);
    tl.to(box,{width:'84cqw',height:'18cqw',borderRadius:'2.4cqw',backgroundColor:'#FCFBF7',borderColor:'#E7E3D6',
      boxShadow:'0 2px 6px rgba(38,38,36,.05), 0 34px 80px -30px rgba(38,38,36,.32)',duration:.7},4.95);  // settle to chat-response's composer shadow for a seamless cut
    tl.to(Lc,{opacity:0,duration:.28},4.95);
    tl.to(Lb,{opacity:1,duration:.36},5.33);
    // PLACEHOLDER (~0.75s): each word rolls up with a bounce while a warm clay shimmer sweeps across
    tl.to(phWords,{opacity:1,y:0,duration:.46,ease:'back.out(1.6)',stagger:0.055},5.5);
    tl.to(phWords,{keyframes:{color:['#9b988f','#D97757','#9b988f']},duration:.5,stagger:0.055,ease:'sine.inOut'},5.53);
    // CUT-THE-CURVE: in the last 0.3s the cursor starts moving toward the chat's click point —
    // it covers the first 1/3 of the path (accelerating); chat-response picks it up at the same
    // position AND velocity (1:2 split, power2.in→power2.out) so the cut to the next scene is seamless.
    tl.to(cursor,{left:'40.7%',top:'63.7%',duration:.3,ease:'power2.in'},6.4);
    // hold the final frame so the timeline duration matches data-duration (HF shows the comp for the timeline's length)
    tl.to(box,{opacity:1,duration:.4},6.3);

    // register with the HyperFrames runtime
    window.__timelines=window.__timelines||{};
    window.__timelines["connector-morph"]=tl;

    // local dev helpers (ignored by the HF runtime): ?t= seek, ?dev=1 autoplay
    const q=new URLSearchParams(location.search);
    if(q.has('t')){tl.seek(parseFloat(q.get('t'))||0);}
    else if(q.get('dev')==='1'){tl.play();}
    })();
    </script>
