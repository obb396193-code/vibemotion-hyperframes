<template>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500&display=block" rel="stylesheet">
<div id="rsp-root" data-composition-id="responds" data-width="1920" data-height="1080" data-duration="5.0">
  <!-- [ui-library] removed missing LFS media: assets/sfx/whoosh-morph.mp3 -->
  <!-- [ui-library] removed missing LFS media: assets/sfx/pop.mp3 -->
  <div class="win">
    <div class="bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span></div>
    <div class="feed">
      <div class="stack">
        <div class="urow">Hey, can we render my edited podcast video we worked on in HyperFrames?</div>
        <div class="arow">On it — rendering <b>podcast-final.mp4</b> locally now.</div>
        <div class="urow">can we also render my five projects from yesterday?</div>
        <div class="arow r-in r-new">The podcast render's at <b>75%</b> — still about <b>10 minutes</b> to go. I can add them to the queue, or render them on <span class="mint">HeyGen Cloud Render</span> so your machine stays free.</div>
      </div>
      <div class="think"><span class="ast">✳</span><span>thinking…</span></div>
    </div>
    <div class="composer">
      <div class="inputbar"><div class="tline"><span class="ph">Reply to Claude…</span></div><span class="ret">↵</span><div class="pet"><!-- [ui-library] removed missing LFS media: assets/pet-typing.mp4 --></div></div>
      <div class="metarow"><div class="ml"><span class="auto">Auto</span><span class="ico">＋</span></div><div class="mr"><span>Opus 4.8</span><span class="hi">High</span><span class="orb"></span></div></div>
    </div>
  </div>

<style>
  /* fonts: original local woff2 (Git-LFS pointers, not downloaded) replaced by Google Fonts <link> in the template head above */
  #rsp-root{position:absolute;inset:0;width:1920px;height:1080px;container-type:size;font-family:'Hanken Grotesk',system-ui,sans-serif;background:#F0EFE9;}
  #rsp-root .win{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:83.3cqw;height:81cqh;background:#1D1F1F;border-radius:1.35cqw;box-shadow:0 2cqw 6cqw -2cqw rgba(20,20,18,.45);overflow:hidden;color:#EFEADD;}
  #rsp-root .bar{position:absolute;top:1.4cqw;left:1.6cqw;display:flex;gap:.62cqw;}
  #rsp-root .dot{width:1.05cqw;height:1.05cqw;border-radius:50%;display:block;}
  #rsp-root .dot.r{background:#FF5F57;}#rsp-root .dot.y{background:#FEBC2E;}#rsp-root .dot.g{background:#28C840;}
  /* shared chat layout */
  #rsp-root .feed{position:absolute;left:3.4cqw;right:3.4cqw;top:6cqw;bottom:16.5cqw;overflow:hidden;}
  #rsp-root .stack{position:absolute;left:0;right:0;bottom:0;display:flex;flex-direction:column;gap:1.6cqw;}
  #rsp-root .urow{align-self:flex-end;max-width:66%;text-align:right;font-size:1.6cqw;font-weight:500;color:#EFEADD;line-height:1.3;}
  #rsp-root .urow b{color:#fff;font-weight:700;}
  #rsp-root .arow{align-self:flex-start;max-width:82%;font-size:1.6cqw;font-weight:400;color:#D8D4C8;line-height:1.4;}
  #rsp-root .arow b{color:#fff;font-weight:600;}#rsp-root .arow .mint{color:#3CE6AC;font-weight:600;}
  #rsp-root .think{position:absolute;left:0;bottom:0;display:flex;align-items:center;gap:.7cqw;color:#8C8B83;font-size:1.4cqw;opacity:0;}
  #rsp-root .think .ast{color:#D97757;font-size:1.6cqw;display:inline-block;}
  #rsp-root .composer{position:absolute;left:3.4cqw;right:3.4cqw;bottom:3.4cqw;}
  #rsp-root .inputbar{position:relative;display:flex;align-items:center;background:#2C2C2B;border:1px solid #3a3a38;border-radius:.9cqw;min-height:3.3cqw;padding:.7cqw 1.2cqw;}
  #rsp-root .ph{font-size:1.6cqw;color:#6F6E66;}
  #rsp-root .ret{position:absolute;right:1.1cqw;top:50%;transform:translateY(-50%);color:#6F6E66;font-size:1.2cqw;}
  #rsp-root .metarow{display:flex;justify-content:space-between;align-items:center;margin-top:.85cqw;color:#7C7B73;font-size:1.0cqw;font-weight:500;}
  #rsp-root .ml,#rsp-root .mr{display:flex;align-items:center;gap:1.0cqw;}
  #rsp-root .auto{background:rgba(202,164,62,.16);color:#CAA43E;padding:.22cqw .7cqw;border-radius:.45cqw;font-size:.92cqw;}
  #rsp-root .ico{color:#8C8B83;font-size:1.15cqw;}
  #rsp-root .orb{width:1.25cqw;height:1.25cqw;border-radius:50%;box-sizing:border-box;border:0.17cqw solid rgba(96,148,214,0.26);border-top-color:#5A9BE6;}
  #rsp-root .pet{position:absolute;right:3cqw;bottom:100%;width:7.6cqw;height:4.4cqw;pointer-events:none;}
  #rsp-root .pet video{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;display:block;
    -webkit-mask-image:linear-gradient(to right,transparent 0,#000 3%,#000 98%,transparent 100%),linear-gradient(to bottom,transparent 0,#000 8%,#000 98%,transparent 100%);
    -webkit-mask-composite:source-in;
    mask-image:linear-gradient(to right,transparent 0,#000 3%,#000 98%,transparent 100%),linear-gradient(to bottom,transparent 0,#000 8%,#000 98%,transparent 100%);
    mask-composite:intersect;}
</style>

<script>
(function(){
  const R=(document.currentScript&&document.currentScript.closest('#rsp-root'))||document.querySelector('#rsp-root');
  if(!R||!window.gsap) return;
  const GAP=30.72;
  const think=R.querySelector('.think'),ast=R.querySelector('.ast'),
        stack=R.querySelector('.stack'),reply=R.querySelector('.r-new'),oldest=stack.children[0],
        win=R.querySelector('.win'),bar=R.querySelector('.bar'),composer=R.querySelector('.composer');
  const pastRows=[...stack.children].filter(el=>!el.classList.contains('r-in')); // M1,M2,M3
  window.__timelines=window.__timelines||{};
  const tl=gsap.timeline({paused:true});

  // rest: M4 (reply) clipped below; M1+M2+M3 bottom-anchored
  const dNew=reply.offsetHeight+GAP;
  const thinkSlot=think.offsetHeight+GAP;
  gsap.set(stack,{y:dNew});
  gsap.set([reply,think],{opacity:0});
  gsap.set(R.querySelector('.orb'),{transformOrigin:'50% 50%'});
  gsap.set(ast,{transformOrigin:'50% 50%'});

  // ENTRANCE: the full-screen terminal morphs DOWN into the chat window while the chrome (traffic
  // lights), the prompt box, and the messages all animate ON as the window forms
  gsap.set(win,{width:1920,height:1080,borderRadius:0});
  gsap.set(bar,{opacity:0});
  gsap.set(composer,{opacity:0,y:34});
  gsap.set(pastRows,{opacity:0,y:18});
  tl.to(win,{width:1599.36,height:874.8,borderRadius:25.92,duration:.6,ease:'power3.inOut'},0);
  tl.to(bar,{opacity:1,duration:.32,ease:'power2.out'},0.32);
  tl.to(composer,{opacity:1,y:0,duration:.42,ease:'power3.out'},0.28);
  tl.to(pastRows,{opacity:1,y:0,duration:.42,ease:'power3.out',stagger:.07},0.34);

  tl.to(R.querySelector('.orb'),{rotation:360,duration:1.0,ease:'none',repeat:5},0);
  // thinking opens the bottom slot: history shifts up, "thinking…" appears closest to the composer
  tl.to(stack,{y:dNew-thinkSlot,duration:.4,ease:'power3.out'},0.7);
  tl.fromTo(think,{opacity:0,y:8},{opacity:1,y:0,duration:.3,ease:'power2.out'},1.05);
  tl.to(ast,{rotation:360,duration:1.0,ease:'none'},1.05);
  // reply replaces the thinking line at the bottom; history settles, oldest (M1) fades out the top
  tl.to(think,{opacity:0,duration:.3,ease:'power2.in'},1.6);
  tl.fromTo(reply,{opacity:0},{opacity:1,duration:.5,ease:'power3.out'},1.75);
  tl.to(stack,{y:0,duration:.6,ease:'power3.out'},1.75);
  tl.to(oldest,{opacity:0,duration:.5,ease:'power2.out'},1.75);
  // extra hold so the reply is readable before the transition
  tl.to({},{duration:.2},4.8);
  window.__timelines["responds"]=tl;
})();
</script>
</div>
</template>
