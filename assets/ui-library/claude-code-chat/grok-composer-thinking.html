<template id="chat-response-template">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=Newsreader:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Spline+Sans+Mono:wght@400;500&display=block" rel="stylesheet">
  <div id="cr-root" data-composition-id="chat-response" data-width="1920" data-height="1080" data-duration="6.9">
    <style>
      /* local fonts (captured woff2, font-display:block) */
      /* fonts: original local woff2 (Git-LFS pointers, not downloaded) replaced by Google Fonts <link> in the template head above */

      #cr-root{
        --paper:#030404; --ink:#F4F4F0; --muted:#A7A7A2; --clay:#F4F4F0;
        --surface:#171717; --surface-2:#111211; --hairline:#2B2B2B; --hairline-soft:#252525;
        --on-accent:#030404;
        --font-universal-sans:"Hanken Grotesk";
        --f-grok:var(--font-universal-sans), ui-sans-serif, system-ui, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji";
        --f-body:"Hanken Grotesk","Inter",system-ui,sans-serif;
        --f-serif:var(--f-grok);
        position:relative;width:1920px;height:1080px;overflow:hidden;
        background:var(--paper);container-type:size;font-family:"Hanken Grotesk","Inter",system-ui,sans-serif;color:var(--ink);
      }
      #cr-root *,
      #cr-root *::before,
      #cr-root *::after{box-sizing:border-box;margin:0;padding:0}
      #cr-root::before{content:"";position:absolute;inset:0;pointer-events:none;opacity:.5;
        background:radial-gradient(circle, rgba(244,244,240,.025) 1px, transparent 1px) 0 0/34px 34px}

      /* ── conversation area (user bubble + thinking) ── */
      #cr-root .msg{position:absolute;right:8%;top:9%;max-width:60cqw;
        background:#202020;border:1px solid var(--hairline-soft);border-radius:1.8cqw;
        padding:1.5cqw 2.1cqw;font-size:2.4cqw;line-height:1.4;color:var(--ink);text-align:left}

      #cr-root .think{position:absolute;left:8.5%;top:24%;display:flex;align-items:center;gap:1.1cqw}
      #cr-root .think .burst{width:5cqw;height:5cqw;display:block}
      #cr-root .grok-dotmark{width:100%;height:100%;display:block;color:var(--ink);overflow:visible}
      #cr-root .grok-dotmark .dot{fill:currentColor;opacity:.2}
      #cr-root .tk{position:relative;min-width:22cqw;height:3.4cqw;display:flex;align-items:center}
      #cr-root .tk .unit{position:absolute;left:0;top:50%;transform:translateY(-50%);white-space:nowrap;
        font-family:"Hanken Grotesk",ui-sans-serif,system-ui,sans-serif;font-style:normal;font-weight:500;font-size:2.45cqw;line-height:1;letter-spacing:0;
        background:linear-gradient(100deg,#F4F4F0 0%,#F4F4F0 40%,#74746F 50%,#F4F4F0 60%,#F4F4F0 100%);
        background-size:280% 100%;background-position:140% 0;
        -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent}

      /* ── composer (prompt box) ── */
      #cr-root .composer{position:absolute;left:50%;top:51.5%;
        width:96cqw;height:8.8cqw;background:#171717;border:1.5px solid var(--hairline-soft);
        border-radius:999px;box-shadow:0 2px 6px rgba(0,0,0,.05), 0 34px 80px -30px rgba(0,0,0,.32)}
      #cr-root .inrow{position:absolute;left:6.9cqw;right:28cqw;top:50%;height:4.5cqw;transform:translateY(-50%)}
      #cr-root .ph{position:absolute;left:0;top:50%;transform:translateY(-50%);font-size:2.55cqw;line-height:1;color:#A7A7A2;font-weight:500;letter-spacing:0;white-space:nowrap}
      #cr-root .typewrap{position:absolute;left:0;top:0;height:4.5cqw;display:inline-flex;align-items:center}
      #cr-root .tw{display:inline-flex;align-items:center;height:4.5cqw;overflow-x:clip;overflow-y:visible;white-space:nowrap;width:0}
      #cr-root .ttext{display:inline-block;font-size:2.55cqw;font-weight:500;color:var(--ink);letter-spacing:0;white-space:nowrap;line-height:1}
      #cr-root .caret{flex:0 0 auto;width:.2cqw;height:2.8cqw;background:var(--clay);margin-left:.06em;border-radius:.06cqw;opacity:0}
      #cr-root .barrow{position:absolute;inset:0 9.1cqw 0 1.35cqw;display:flex;align-items:center;justify-content:space-between;pointer-events:none}
      #cr-root .left,#cr-root .right{display:flex;align-items:center;gap:1.35cqw}
      #cr-root .cbtn{height:4.9cqw;display:flex;align-items:center;justify-content:center;border-radius:999px;border:1.5px solid transparent;background:transparent;color:var(--ink);font-size:1.95cqw;font-weight:500}
      #cr-root .cbtn.icon{width:4.9cqw;padding:0}
      #cr-root .cbtn svg{width:2.8cqw;height:2.8cqw;stroke:var(--ink);stroke-width:2;fill:none;stroke-linecap:round}
      #cr-root .model{display:flex;align-items:center;gap:.75cqw;font-size:2.05cqw;color:var(--ink);font-weight:600;margin-right:.6cqw}
      #cr-root .model svg{width:2.1cqw;height:2.1cqw;stroke:var(--muted);stroke-width:2.2;fill:none}
      #cr-root .mic{width:4.3cqw;height:4.3cqw;display:grid;place-items:center;color:var(--ink)}
      #cr-root .mic svg{width:2.8cqw;height:2.8cqw;stroke:currentColor;stroke-width:2.2;fill:none;stroke-linecap:round;stroke-linejoin:round}
      #cr-root .send{position:absolute;right:1.45cqw;top:50%;transform:translateY(-50%);width:6.2cqw;height:6.2cqw;border-radius:50%;background:var(--clay);display:grid;place-items:center;color:var(--on-accent)}
      #cr-root .send svg{position:absolute;width:3.4cqw;height:3.4cqw;stroke:currentColor;stroke-width:2.4;fill:none;stroke-linecap:round;stroke-linejoin:round}
      #cr-root .send .send-icon{opacity:0;width:2.8cqw;height:2.8cqw}

      #cr-root .cursor{position:absolute;left:50%;top:73%;width:7cqw;height:7cqw;z-index:30;filter:drop-shadow(0 4px 6px rgba(0,0,0,.3));pointer-events:none}
    </style>

    <!-- user message bubble (appears on send) -->
    <div class="msg" id="msg" data-layout-allow-occlusion="true"></div>

    <!-- thinking (Grok dotmark + shimmer text) -->
    <div class="think" id="think">
      <div class="burst" id="burst"></div>
      <div class="tk" id="tk"></div>
    </div>

    <!-- composer -->
    <div class="composer" id="composer" data-layout-allow-occlusion="true">
      <div class="inrow" id="inrow">
        <span class="ph" id="ph">Ask Grok</span>
        <span class="ph" id="ph2" data-layout-allow-overlap="true">Write a message...</span>

      </div>
      <div class="barrow" id="barrow">
        <div class="left">

        </div>
        <div class="right">

          <div class="mic"><svg viewBox="0 0 24 24"><path d="M12 3a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V6a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><path d="M12 19v3"/></svg></div>
        </div>
      </div>
      <div class="send" id="send">

        <svg class="send-icon" id="sendIcon" viewBox="0 0 24 24"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
      </div>
    </div>
