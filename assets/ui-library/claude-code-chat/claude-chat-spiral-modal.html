<template id="act2b-spiral-template">
  <div data-composition-id="act2b-spiral" data-width="1920" data-height="1080" data-start="0" data-duration="4">
    <div class="app">
      <!-- Top bar (same as act2a) -->
      <div class="topbar">
        <div class="topbar-left">
          <div class="icon-btn">
            <svg viewBox="0 0 24 24" width="20" height="20"><path d="M3 6h18M3 12h18M3 18h18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none"/></svg>
          </div>
          <div class="logo-mark">
            <svg viewBox="0 0 32 32" width="26" height="26"><g fill="#D97757"><path d="M16 2 L17.4 12.6 L21.2 4.8 L18.7 13.3 L26.2 8.2 L19.5 14.8 L29.4 14 L19.6 16.6 L28 21.6 L18.8 17.8 L22.5 27.2 L16.8 18.4 L15.4 28.8 L14.7 18.2 L9.2 27.2 L13 17.8 L3.8 21.6 L12.3 16.6 L2.6 14 L12.4 14.8 L5.8 8.2 L13.3 13.3 L10.8 4.8 L14.6 12.6 Z"/></g></svg>
          </div>
          <div class="project-name">Timeline Editor Launch</div>
        </div>
        <div class="topbar-right">
          <div class="model-pill">
            Claude Opus 4.7
            <svg viewBox="0 0 12 12" width="11" height="11"><path d="M3 5l3 3 3-3" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
          </div>
          <div class="avatar">J</div>
        </div>
      </div>

      <!-- Thread viewport with scrolling stack -->
      <div class="viewport">
        <div class="fade-top"></div>
        <div class="thread" id="thread">
          <!-- 7 exchanges — each is user ask + Done. reply -->
        </div>
        <div class="fade-bottom"></div>
      </div>

      <!-- Composer with live prompt -->
      <div class="composer-wrap">
        <div class="composer">
          <div class="composer-text" id="composer-text"></div>
          <div class="composer-actions">
            <div class="attach">
              <svg viewBox="0 0 24 24" width="18" height="18"><path d="M21 11.5l-8.5 8.5a5 5 0 1 1-7-7l8.5-8.5a3.5 3.5 0 1 1 5 5L11 17.5a2 2 0 1 1-3-3l7-7" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
            </div>
            <div class="send" id="send-btn">
              <svg viewBox="0 0 24 24" width="16" height="16"><path d="M12 5v14M5 12l7-7 7 7" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
          </div>
        </div>
        <div class="composer-meta">Claude can make mistakes. Please double-check responses.</div>
      </div>

      <!-- Session limit modal -->
      <div class="limit-scrim" id="limit-scrim"></div>
      <div class="limit-modal" id="limit-modal">
        <div class="limit-icon">
          <svg viewBox="0 0 24 24" width="28" height="28"><circle cx="12" cy="12" r="10" stroke="#D97757" stroke-width="1.8" fill="none"/><path d="M12 7v5l3 2" stroke="#D97757" stroke-width="1.8" stroke-linecap="round" fill="none"/></svg>
        </div>
        <div class="limit-title">Session limit reached</div>
        <div class="limit-body">You've hit the message limit for this session. Please try again later.</div>
      </div>
    </div>

    <style>
      [data-composition-id="act2b-spiral"] {
        width: 1920px;
        height: 1080px;
        position: relative;
        overflow: hidden;
        font-family: ui-sans-serif, "Söhne", "Inter", system-ui, -apple-system, sans-serif;
        background: #F5F4ED;
        color: #3D3929;
      }
      [data-composition-id="act2b-spiral"] .app {
        position: absolute; inset: 0;
        display: flex; flex-direction: column;
      }

      [data-composition-id="act2b-spiral"] .topbar {
        height: 64px; padding: 0 28px;
        display: flex; align-items: center; justify-content: space-between;
        border-bottom: 1px solid #EBE7DB;
        background: #FAF9F5;
      }
      [data-composition-id="act2b-spiral"] .topbar-left,
      [data-composition-id="act2b-spiral"] .topbar-right {
        display: flex; align-items: center; gap: 14px;
      }
      [data-composition-id="act2b-spiral"] .icon-btn {
        width: 36px; height: 36px; color: #6B6757;
        display: flex; align-items: center; justify-content: center;
      }
      [data-composition-id="act2b-spiral"] .project-name { font-size: 18px; color: #3D3929; font-weight: 500; }
      [data-composition-id="act2b-spiral"] .model-pill {
        display: flex; align-items: center; gap: 8px;
        font-size: 15px; color: #6B6757;
        padding: 8px 14px; border-radius: 999px;
        background: #F0ECE0; border: 1px solid #E5E0D1;
      }
      [data-composition-id="act2b-spiral"] .avatar {
        width: 36px; height: 36px; border-radius: 50%;
        background: #D97757; color: #fff;
        display: flex; align-items: center; justify-content: center;
        font-weight: 600; font-size: 15px;
      }

      /* Viewport */
      [data-composition-id="act2b-spiral"] .viewport {
        flex: 1;
        position: relative;
        overflow: hidden;
      }
      [data-composition-id="act2b-spiral"] .fade-top,
      [data-composition-id="act2b-spiral"] .fade-bottom {
        position: absolute; left: 0; right: 0; height: 110px;
        z-index: 5; pointer-events: none;
      }
      [data-composition-id="act2b-spiral"] .fade-top {
        top: 0; background: linear-gradient(#F5F4ED 25%, rgba(245,244,237,0));
      }
      [data-composition-id="act2b-spiral"] .fade-bottom {
        bottom: 0; background: linear-gradient(rgba(245,244,237,0), #F5F4ED 75%);
      }
      [data-composition-id="act2b-spiral"] .thread {
        position: absolute;
        top: 60px;
        left: 0; right: 0;
        display: flex; flex-direction: column;
        align-items: center;
        gap: 24px;
        will-change: transform;
      }

      [data-composition-id="act2b-spiral"] .exchange {
        width: 900px;
        display: flex; flex-direction: column;
        gap: 12px;
      }
      [data-composition-id="act2b-spiral"] .user-row {
        display: flex; justify-content: flex-end;
      }
      [data-composition-id="act2b-spiral"] .user-row .bubble {
        max-width: 620px;
        padding: 14px 20px;
        background: #F0ECE0;
        border: 1px solid #E5E0D1;
        border-radius: 16px;
        font-size: 20px;
        line-height: 1.5;
        color: #3D3929;
      }
      [data-composition-id="act2b-spiral"] .claude-row {
        display: flex; gap: 14px; align-items: flex-start;
      }
      [data-composition-id="act2b-spiral"] .claude-mark {
        width: 32px; height: 32px; flex: 0 0 32px;
        border-radius: 8px; background: #fff;
        border: 1px solid #E5E0D1;
        display: flex; align-items: center; justify-content: center;
      }
      [data-composition-id="act2b-spiral"] .claude-reply {
        font-size: 20px; color: #2A2720;
        padding-top: 4px;
      }

      /* Composer */
      [data-composition-id="act2b-spiral"] .composer-wrap {
        padding: 0 0 44px;
        display: flex; flex-direction: column; align-items: center; gap: 14px;
        position: relative; z-index: 6;
      }
      [data-composition-id="act2b-spiral"] .composer {
        width: 900px; min-height: 88px;
        background: #FFFFFF;
        border: 1px solid #E5E0D1;
        border-radius: 20px;
        box-shadow: 0 2px 12px rgba(61, 57, 41, 0.04);
        padding: 18px 20px 14px;
        display: flex; flex-direction: column; justify-content: space-between;
      }
      [data-composition-id="act2b-spiral"] .composer-text {
        font-size: 20px; color: #3D3929; min-height: 28px;
      }
      [data-composition-id="act2b-spiral"] .composer-actions {
        display: flex; justify-content: flex-end; align-items: center; gap: 10px;
      }
      [data-composition-id="act2b-spiral"] .attach {
        width: 36px; height: 36px; color: #8C8674;
        display: flex; align-items: center; justify-content: center;
      }
      [data-composition-id="act2b-spiral"] .send {
        width: 36px; height: 36px; border-radius: 10px;
        background: #D97757;
        display: flex; align-items: center; justify-content: center;
      }
      [data-composition-id="act2b-spiral"] .composer-meta {
        font-size: 13px; color: #A19B87;
      }

      /* Session limit modal */
      [data-composition-id="act2b-spiral"] .limit-scrim {
        position: absolute; inset: 0;
        background: rgba(30, 28, 20, 0.35);
        opacity: 0;
        z-index: 20;
        pointer-events: none;
      }
      [data-composition-id="act2b-spiral"] .limit-modal {
        position: absolute;
        top: 50%; left: 50%;
        width: 440px;
        padding: 32px 36px 30px;
        background: #FFFFFF;
        border: 1px solid #E5E0D1;
        border-radius: 18px;
        box-shadow: 0 24px 60px rgba(61, 57, 41, 0.22), 0 4px 12px rgba(61, 57, 41, 0.08);
        display: flex; flex-direction: column; align-items: center;
        gap: 12px; text-align: center;
        opacity: 0;
        z-index: 21;
      }
      [data-composition-id="act2b-spiral"] .limit-icon {
        width: 56px; height: 56px; border-radius: 50%;
        background: #FBEFE8;
        display: flex; align-items: center; justify-content: center;
        margin-bottom: 4px;
      }
      [data-composition-id="act2b-spiral"] .limit-title {
        font-size: 22px; font-weight: 600; color: #2A2720;
      }
      [data-composition-id="act2b-spiral"] .limit-body {
        font-size: 16px; color: #6B6757; line-height: 1.45;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      (function () {
        const scope = document.querySelector('[data-composition-id="act2b-spiral"]');
        const q = (s) => scope.querySelector(s);

        const prompts = [
          // Phase 1 — legible (3 exchanges)
          "actually 0.05s earlier",
          "try 0.08",
          "too much, +0.02",
          // Phase 2 — accelerating (6)
          "0.06?",
          "split the difference",
          "one more frame",
          "back 0.01",
          "hmm 0.018",
          "try 0.014",
          // Phase 3 — blur zone (20)
          "0.015?",
          "nudge right",
          "nope, left",
          "0.013",
          "+1ms",
          "-1ms",
          "0.0125",
          "try 0.011",
          "closer",
          "still off",
          "back one frame",
          "forward one",
          "0.0118",
          "just a hair",
          "0.0122",
          "0.012 exactly",
          "0.0119",
          "half frame",
          "0.01195",
          "one tenth ms",
          "0.01193"
        ];

        const thread = q("#thread");
        const composerEl = q("#composer-text");
        const sendBtn = q("#send-btn");

        // Build the exchanges in DOM up front
        const exchanges = prompts.map((p) => {
          const ex = document.createElement("div");
          ex.className = "exchange";
          ex.innerHTML = `
            <div class="user-row"><div class="bubble">${p}</div></div>
            <div class="claude-row">
              <div class="claude-mark">
                <svg viewBox="0 0 32 32" width="20" height="20"><g fill="#D97757"><path d="M16 2 L17.4 12.6 L21.2 4.8 L18.7 13.3 L26.2 8.2 L19.5 14.8 L29.4 14 L19.6 16.6 L28 21.6 L18.8 17.8 L22.5 27.2 L16.8 18.4 L15.4 28.8 L14.7 18.2 L9.2 27.2 L13 17.8 L3.8 21.6 L12.3 16.6 L2.6 14 L12.4 14.8 L5.8 8.2 L13.3 13.3 L10.8 4.8 L14.6 12.6 Z"/></g></svg>
              </div>
              <div class="claude-reply">Done.</div>
            </div>
          `;
          thread.appendChild(ex);
          return ex;
        });

        const tl = gsap.timeline({ paused: true });

        // Initial: all exchanges hidden, thread at top
        gsap.set(exchanges, { opacity: 0, y: 30 });
        gsap.set(thread, { y: 0 });
        composerEl.innerText = "";

        // Chrome enters
        tl.from(q(".topbar"), { y: -20, opacity: 0, duration: 0.3, ease: "power2.out" }, 0)
          .from(q(".composer-wrap"), { y: 30, opacity: 0, duration: 0.3, ease: "power2.out" }, 0);

        // Ramped pace: 3 legible → 6 accelerating → 20 blur zone
        // Phase 1 (0-3): 0.42s per exchange
        // Phase 2 (3-9): 0.17s per exchange
        // Phase 3 (9-29): 0.07s per exchange
        const gapFor = (idx) => {
          if (idx < 3) return 0.42;
          if (idx < 9) return 0.17;
          return 0.07;
        };

        let t = 0.2;
        const exchHeight = 120;

        prompts.forEach((p, idx) => {
          const blurPhase = idx >= 9;
          // Composer flashes the prompt
          tl.call(() => { composerEl.innerText = p; }, [], t);

          // Send button pulse (skip in blur phase for speed)
          if (!blurPhase) {
            tl.to(sendBtn, { scale: 0.9, duration: 0.04, ease: "power2.out" }, t + 0.06)
              .to(sendBtn, { scale: 1, duration: 0.08, ease: "back.out(2)" }, t + 0.1);
          }

          // Clear composer
          tl.call(() => { composerEl.innerText = ""; }, [], t + 0.08);

          // Exchange pops in — shorter duration in blur phase
          tl.to(exchanges[idx], {
            opacity: 1, y: 0,
            duration: blurPhase ? 0.08 : 0.2,
            ease: "power2.out"
          }, t + 0.06);

          // Scroll thread up after first couple so latest stays in view
          if (idx >= 2) {
            tl.to(thread, {
              y: -(idx - 1) * exchHeight,
              duration: blurPhase ? 0.08 : 0.2,
              ease: blurPhase ? "none" : "power2.out"
            }, t + 0.08);
          }

          t += gapFor(idx);
        });

        // Motion blur ramps up through phase 3
        tl.to(thread, {
          filter: "blur(2px)",
          duration: 0.6, ease: "power2.in"
        }, 2.0);

        // Final beat anchored before the exit cut (exit starts at 3.2)
        const FINAL_BEAT = 2.85;

        // Final hold — frustrated stillness. Composer sits mid-type.
        tl.call(() => { composerEl.innerText = "maybe +0.0005…"; }, [], FINAL_BEAT);

        // Blur snaps off on the hold frame
        tl.to(thread, {
          filter: "blur(0px)",
          duration: 0.2, ease: "power3.out"
        }, FINAL_BEAT);

        // Subtle camera shake on final beat (frustration)
        tl.to(scope, {
          x: -2, duration: 0.05, repeat: 5, yoyo: true, ease: "steps(1)"
        }, FINAL_BEAT + 0.05);

        // Session limit popup — appears with the shake
        const scrim = q("#limit-scrim");
        const modal = q("#limit-modal");
        gsap.set(modal, { xPercent: -50, yPercent: -50, scale: 0.9 });
        tl.to(scrim, { opacity: 1, duration: 0.18, ease: "power2.out" }, FINAL_BEAT + 0.05)
          .to(modal, {
            opacity: 1,
            scale: 1,
            duration: 0.26,
            ease: "back.out(1.8)"
          }, FINAL_BEAT + 0.05);

        // =====================
        // Cut-the-curve EXIT: last 0.45s of act2b rushes UP + blur ramp.
        // Pairs with act3's scene-B entry (matched 10px blur, opposite Y offset)
        // so the cut reads as one continuous upward motion across the boundary.
        // =====================
        const EXIT_T_2B = 3.65 - 0.45; // 3.2
        tl.to(".app", {
          y: -280,
          filter: "blur(10px)",
          duration: 0.45,
          ease: "power3.in",
          overwrite: "auto"
        }, EXIT_T_2B);
        tl.to(".app", {
          opacity: 0,
          duration: 0.22,
          ease: "power2.in"
        }, EXIT_T_2B + 0.23);

        // Pad to match data-duration
        tl.to({}, { duration: 3.65 }, 0);

        window.__timelines["act2b-spiral"] = tl;
      })();
    </script>
  </div>
</template>
