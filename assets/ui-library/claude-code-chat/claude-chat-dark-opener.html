<template>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<div id="op-root" data-composition-id="opener" data-width="1920" data-height="1080" data-duration="6.0">
  <!-- [ui-library] removed missing LFS media: assets/sfx/whoosh-slide.mp3 -->
  <!-- [ui-library] removed missing LFS media: assets/sfx/type.mp3 -->
  <!-- [ui-library] removed missing LFS media: assets/sfx/click.mp3 -->
  <!-- [ui-library] removed missing LFS media: assets/sfx/pop.mp3 -->
  <!-- [ui-library] removed missing LFS media: assets/sfx/pop.mp3 -->
  <div class="win">
    <div class="bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span></div>
    <div class="feed">
      <div class="stack">
        <div class="urow r-m1">Hey, can we render my edited podcast video we worked on in HyperFrames?</div>
        <div class="arow r-in r-m2">On it — rendering <b>podcast-final.mp4</b> locally now.</div>
      </div>
      <div class="think"><span class="ast">✳</span><span>thinking…</span></div>
    </div>
    <div class="composer">
      <div class="chips">
        <span class="chip"><svg viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="11" rx="1.6"/><path d="M2 19h20"/></svg>Local</span>
        <span class="chip"><svg viewBox="0 0 24 24"><path d="M3 7.5A2 2 0 0 1 5 5.5h4.2l2 2.2H19a2 2 0 0 1 2 2V17a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>CC</span>
      </div>
      <div class="inputbar">
        <div class="tline"><span class="typed"></span><span class="caret">▏</span></div>
        <span class="ret">↵</span>
        <!-- pixel pet typing, perched on the prompt's top edge (looped to cover the comp) -->
        <div class="pet"><!-- [ui-library] removed missing LFS media: assets/pet-typing.mp4 --><!-- [ui-library] removed missing LFS media: assets/pet-typing.mp4 --></div>
      </div>
      <div class="metarow">
        <div class="ml"><span class="auto">Auto</span><span class="ico">＋</span></div>
        <div class="mr"><span>Opus 4.8</span><span class="hi">High</span><span class="orb"></span></div>
      </div>
    </div>
  </div>
  <svg class="cursor" viewBox="0 0 28 28"><path d="M6 4 L6 23 L11 18 L14.5 25 L17.5 23.6 L14 17 L21 17 Z" fill="#1c1c1c" stroke="#ffffff" stroke-width="1.4" stroke-linejoin="round"/></svg>

<style>
  /* fonts: original local woff2 (Git-LFS pointers, not downloaded) replaced by Google Fonts <link> in the template head above */
  #op-root{position:absolute;inset:0;width:1920px;height:1080px;container-type:size;
    font-family:'Hanken Grotesk',system-ui,sans-serif;background:#F0EFE9;}
  #op-root .win{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    width:83.3cqw;height:81cqh;background:#1D1F1F;border-radius:1.35cqw;
    box-shadow:0 2cqw 6cqw -2cqw rgba(20,20,18,.45);overflow:hidden;color:#EFEADD;}
  #op-root .bar{position:absolute;top:1.4cqw;left:1.6cqw;display:flex;gap:.62cqw;}
  #op-root .dot{width:1.05cqw;height:1.05cqw;border-radius:50%;display:block;}
  #op-root .dot.r{background:#FF5F57;}#op-root .dot.y{background:#FEBC2E;}#op-root .dot.g{background:#28C840;}
  /* shared chat layout */
  #op-root .feed{position:absolute;left:3.4cqw;right:3.4cqw;top:6cqw;bottom:16.5cqw;overflow:hidden;}
  #op-root .stack{position:absolute;left:0;right:0;bottom:0;display:flex;flex-direction:column;gap:1.6cqw;}
  #op-root .urow{align-self:flex-end;max-width:66%;text-align:right;font-size:1.6cqw;font-weight:500;color:#EFEADD;line-height:1.3;}
  #op-root .urow b{color:#fff;font-weight:700;}
  #op-root .arow{align-self:flex-start;max-width:82%;font-size:1.6cqw;font-weight:400;color:#D8D4C8;line-height:1.4;}
  #op-root .arow b{color:#fff;font-weight:600;}#op-root .arow .mint{color:#3CE6AC;font-weight:600;}
  #op-root .think{position:absolute;left:0;bottom:0;display:flex;align-items:center;gap:.7cqw;color:#8C8B83;font-size:1.4cqw;opacity:0;}
  #op-root .think .ast{color:#D97757;font-size:1.6cqw;display:inline-block;}
  #op-root .composer{position:absolute;left:3.4cqw;right:3.4cqw;bottom:3.4cqw;will-change:transform;}
  #op-root .pet{position:absolute;right:3cqw;bottom:100%;width:7.6cqw;height:4.4cqw;pointer-events:none;}
  #op-root .pet video{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;display:block;
    -webkit-mask-image:linear-gradient(to right,transparent 0,#000 3%,#000 98%,transparent 100%),linear-gradient(to bottom,transparent 0,#000 8%,#000 98%,transparent 100%);
    -webkit-mask-composite:source-in;
    mask-image:linear-gradient(to right,transparent 0,#000 3%,#000 98%,transparent 100%),linear-gradient(to bottom,transparent 0,#000 8%,#000 98%,transparent 100%);
    mask-composite:intersect;}
  #op-root .chips{display:flex;gap:.6cqw;margin-bottom:.9cqw;}
  #op-root .chip{display:inline-flex;align-items:center;gap:.5cqw;background:#2C2C2B;color:#D7D4CA;font-size:.98cqw;font-weight:500;padding:.46cqw .82cqw;border-radius:.55cqw;}
  #op-root .chip svg{width:1.1cqw;height:1.1cqw;stroke:#C9C6BC;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round;display:block;}
  #op-root .inputbar{position:relative;display:flex;align-items:center;background:#2C2C2B;border:1px solid #3a3a38;border-radius:.9cqw;min-height:3.3cqw;padding:.7cqw 1.2cqw;}
  #op-root .tline{flex:1;min-width:0;padding-right:2.6cqw;white-space:pre-wrap;overflow-wrap:break-word;line-height:1.45;}
  #op-root .typed{font-size:1.15cqw;font-weight:400;color:#E6E2D6;}
  #op-root .caret{font-size:1.45cqw;color:#D97757;margin-left:.05cqw;}
  #op-root .ret{position:absolute;right:1.1cqw;top:50%;transform:translateY(-50%);color:#6F6E66;font-size:1.2cqw;}
  #op-root .cursor{position:absolute;width:5.5cqw;height:5.5cqw;z-index:30;opacity:0;pointer-events:none;filter:drop-shadow(0 .2cqw .35cqw rgba(0,0,0,.35));}
  #op-root .metarow{display:flex;justify-content:space-between;align-items:center;margin-top:.85cqw;color:#7C7B73;font-size:1.0cqw;font-weight:500;}
  #op-root .ml,#op-root .mr{display:flex;align-items:center;gap:1.0cqw;}
  #op-root .auto{background:rgba(202,164,62,.16);color:#CAA43E;padding:.22cqw .7cqw;border-radius:.45cqw;font-size:.92cqw;}
  #op-root .ico{color:#8C8B83;font-size:1.15cqw;}
  #op-root .orb{width:1.25cqw;height:1.25cqw;border-radius:50%;box-sizing:border-box;border:0.17cqw solid rgba(96,148,214,0.26);border-top-color:#5A9BE6;}
</style>

<script>
(function(){
  const root=(document.currentScript&&document.currentScript.closest('#op-root'))||document.querySelector('#op-root');
  const R=root; if(!R||!window.gsap) return;
  const GAP=30.72; // 1.6cqw at 1920 container
  const PROMPT="Hey, can we render my edited podcast video we worked on in HyperFrames?";
  const typed=R.querySelector('.typed'),caret=R.querySelector('.caret'),
        stack=R.querySelector('.stack'),m1=R.querySelector('.r-m1'),m2=R.querySelector('.r-m2'),
        think=R.querySelector('.think'),ast=R.querySelector('.ast'),
        composer=R.querySelector('.composer'),cursor=R.querySelector('.cursor'),
        ret=R.querySelector('.ret'),win=R.querySelector('.win'),bar=R.querySelector('.bar'),pet=R.querySelector('.pet');
  window.__timelines=window.__timelines||{};
  const tl=gsap.timeline({paused:true});

  // px against 1920×1080: 1cqw = 19.2px. docked composer left/right/bottom 3.4cqw.
  gsap.set(win,{width:1920,height:1080,borderRadius:0,boxShadow:'0 2cqw 6cqw -2cqw rgba(20,20,18,0)'});
  gsap.set(bar,{opacity:0});
  gsap.set(composer,{right:'auto',width:840,left:540,bottom:370,scale:1.85,transformOrigin:'50% 100%'});

  // chat feed: BOTH M1 + M2 start clipped below the fold (feed stays empty through typing + morph,
  // so the sent message is never seen floating at the bottom — it rises up from behind the prompt box)
  const dM1=m1.offsetHeight+GAP, dM2=m2.offsetHeight+GAP;
  const thinkSlot=think.offsetHeight+GAP;
  gsap.set(stack,{y:dM1+dM2});
  gsap.set([m1,m2,think],{opacity:0});
  gsap.set(ast,{transformOrigin:'50% 50%'});

  // measure the ↵ at its FINAL (wrapped) position so the cursor lands on it even when the box grows
  const CUR=105.6;
  function ctr(el){const rb=R.getBoundingClientRect(),b=el.getBoundingClientRect(),s=(R.offsetWidth||1920)/(rb.width||1);return{x:(b.left+b.width/2-rb.left)*s,y:(b.top+b.height/2-rb.top)*s};}
  typed.textContent=PROMPT;                       // force the (possibly wrapped) layout
  const rcRet=ctr(ret); typed.textContent='';
  const tipX=rcRet.x-0.21*CUR, tipY=rcRet.y-0.14*CUR;

  // entry: composer parts cut in from the right
  const chipsEl=R.querySelector('.chips'),inputEl=R.querySelector('.inputbar'),metaEl=R.querySelector('.metarow');
  tl.fromTo(inputEl,{x:280,opacity:0},{x:0,opacity:1,duration:.55,ease:'power3.out'},0.02);
  tl.fromTo(chipsEl,{x:340,opacity:0},{x:0,opacity:1,duration:.55,ease:'power3.out'},0.10);
  tl.fromTo(metaEl,{x:340,opacity:0},{x:0,opacity:1,duration:.55,ease:'power3.out'},0.16);
  gsap.set(R.querySelector('.orb'),{transformOrigin:'50% 50%'});
  tl.to(R.querySelector('.orb'),{rotation:360,duration:1.0,ease:'none',repeat:5},0);

  gsap.set(caret,{opacity:1});
  tl.to(caret,{opacity:0,duration:.5,ease:'steps(1)',repeat:7,yoyo:true},0.6);
  const obj={n:0};
  tl.to(obj,{n:PROMPT.length,duration:2.0,ease:'none',onUpdate(){typed.textContent=PROMPT.slice(0,Math.round(obj.n));}},0.7);

  // cursor rises up the y-axis to the ↵ send key (measured, so it tracks the wrapped box), then taps
  tl.fromTo(cursor,{left:tipX,top:tipY+340,opacity:0},{left:tipX,top:tipY,opacity:1,duration:.85,ease:'power3.out'},2.0);
  tl.to(cursor,{scale:.84,duration:.1,ease:'power2.in',transformOrigin:'21% 14%'},2.95);
  tl.to(cursor,{scale:1,duration:.2,ease:'power2.out',transformOrigin:'21% 14%'},3.05);
  tl.fromTo(ret,{color:'#6F6E66'},{color:'#D97757',duration:.08,ease:'power1.in'},3.0);
  tl.to(ret,{color:'#6F6E66',duration:.25},3.2);

  // SEND: just clear the composer — the message stays hidden behind the prompt box through the morph
  tl.set(caret,{opacity:0},3.1);
  tl.add(()=>{typed.textContent='';},3.1);

  // MORPH: composer docks while window shrinks full-bleed → floating (cream + traffic lights reveal)
  const morph={p:0};
  tl.to(morph,{p:1,duration:.7,ease:'power2.inOut',onUpdate(){
    const p=morph.p,s=1.85-0.85*p,vw=1554-85.2*p,w=vw/s,W=1920-320.64*p;
    composer.style.width=w+'px';composer.style.left=(W/2-w/2)+'px';
    composer.style.bottom=(370-304.72*p)+'px';composer.style.transform='scale('+s+')';
  }},3.15);
  tl.to(win,{width:1599.36,height:874.8,borderRadius:25.92,boxShadow:'0 2cqw 6cqw -2cqw rgba(20,20,18,.45)',duration:.7,ease:'power2.inOut'},3.15);
  tl.fromTo(bar,{opacity:0,x:-14},{opacity:1,x:0,duration:.35,ease:'power2.out'},3.45);
  // pet stays perched on the prompt through the morph (no fade) — rides the box down
  tl.to(cursor,{top:'58%',opacity:0,duration:.35,ease:'power2.in'},3.2);
  // chips drop as the window docks → composer matches the other chat scenes, reply sits clear
  tl.to(chipsEl,{opacity:0,height:0,marginBottom:0,duration:.3,ease:'power2.in'},3.2);

  // M1 RISES up from behind the docked prompt box into the feed (was clipped below the fold)
  tl.fromTo(m1,{opacity:0},{opacity:1,duration:.35,ease:'power2.out'},3.85);
  tl.to(stack,{y:dM2,duration:.5,ease:'power3.out'},3.85);

  // THINKING: brief beat before Claude answers — opens the bottom slot below M1
  tl.to(stack,{y:dM2-thinkSlot,duration:.35,ease:'power3.out'},4.4);
  tl.fromTo(think,{opacity:0,y:8},{opacity:1,y:0,duration:.3,ease:'power2.out'},4.45);
  tl.to(ast,{rotation:360,duration:1.0,ease:'none'},4.45);

  // REPLY (M2): rises up from behind the prompt box, replaces thinking; M1 shifts up. End == ask start.
  tl.to(think,{opacity:0,duration:.3,ease:'power2.in'},4.95);
  tl.fromTo(m2,{opacity:0},{opacity:1,duration:.4,ease:'power2.out'},5.05);
  tl.to(stack,{y:0,duration:.5,ease:'power3.out'},5.05);

  // hold to comp end
  tl.to({},{duration:.2},5.8);
  window.__timelines["opener"]=tl;
})();
</script>
</div>
</template>
