<template id="captions-template">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500&display=block" rel="stylesheet">
  <div id="cap-root" data-composition-id="captions" data-width="1920" data-height="1080" data-duration="38.7">
    <style>
      /* fonts: original local woff2 (Git-LFS pointers, not downloaded) replaced by Google Fonts <link> in the template head above */
      #cap-root{ position:relative;width:1920px;height:1080px;overflow:hidden;background:transparent;
        container-type:size;font-family:"TT Norms Pro","Hanken Grotesk",system-ui,sans-serif; }
      #cap-root .stage{position:absolute;left:0;right:0;bottom:16.3cqh;display:grid;place-items:center;z-index:2}
      #cap-root .cap{position:absolute;max-width:74cqw;text-align:center;opacity:0;will-change:opacity;
        font-weight:600;font-size:2.5cqw;letter-spacing:-0.01em;line-height:1.25;color:#FFFFFF;
        text-shadow:0 0.15cqw 0.7cqw rgba(0,0,0,.55), 0 0 0.2cqw rgba(0,0,0,.45)}
    </style>
    <div class="stage">
      <div class="cap" id="cap0">Video generation provisioned from the CLI.</div>
      <div class="cap" id="cap1">It's never been easier to build a product.</div>
      <div class="cap" id="cap2">With Stripe projects and the HeyGen CLI,</div>
      <div class="cap" id="cap3">an agent can create its own account,</div>
      <div class="cap" id="cap4">get a capped budget without ever handing a card over,</div>
      <div class="cap" id="cap5">and create a finished launch video.</div>
      <div class="cap" id="cap6">The agent discovers, provisions, generates, and pays through Stripe projects.</div>
      <div class="cap" id="cap7">Now agents can build with video autonomously.</div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script>
    (function(){
      const tl=gsap.timeline({paused:true});
      tl.to("#cap0",{opacity:1,duration:.14,ease:"power2.out"},0.06);
      tl.to("#cap0",{opacity:0,duration:.14,ease:"power2.in"},3.13);
      tl.to("#cap1",{opacity:1,duration:.14,ease:"power2.out"},3.15);
      tl.to("#cap1",{opacity:0,duration:.14,ease:"power2.in"},5.01);
      tl.to("#cap2",{opacity:1,duration:.14,ease:"power2.out"},5.04);
      tl.to("#cap2",{opacity:0,duration:.14,ease:"power2.in"},7.13);
      tl.to("#cap3",{opacity:1,duration:.14,ease:"power2.out"},7.13);
      tl.to("#cap3",{opacity:0,duration:.14,ease:"power2.in"},8.79);
      tl.to("#cap4",{opacity:1,duration:.14,ease:"power2.out"},8.79);
      tl.to("#cap4",{opacity:0,duration:.14,ease:"power2.in"},11.29);
      tl.to("#cap5",{opacity:1,duration:.14,ease:"power2.out"},11.29);
      tl.to("#cap5",{opacity:0,duration:.14,ease:"power2.in"},12.86);
      tl.to("#cap6",{opacity:1,duration:.14,ease:"power2.out"},27.00);
      tl.to("#cap6",{opacity:0,duration:.14,ease:"power2.in"},32.24);
      tl.to("#cap7",{opacity:1,duration:.14,ease:"power2.out"},32.70);
      tl.to("#cap7",{opacity:0,duration:.14,ease:"power2.in"},34.90);
      window.__timelines=window.__timelines||{};
      window.__timelines["captions"]=tl;
      const q=new URLSearchParams(location.search);
      if(q.has('t')){tl.seek(parseFloat(q.get('t'))||0);}
      else if(q.get('dev')==='1'){tl.play();}
    })();
    </script>
  </div>
</template>
