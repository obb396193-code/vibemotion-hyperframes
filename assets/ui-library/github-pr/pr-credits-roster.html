<style>
  /* fonts: original local woff2 (Git-LFS pointers, not downloaded) replaced by Google Fonts <link> in the template head above */

  #cr-root{position:absolute;inset:0;width:1920px;height:1080px;container-type:size;font-family:'Hanken Grotesk',system-ui,sans-serif;background:#F0EFE9;}
  #cr-root .bg{position:absolute;inset:0;background:#F0EFE9;z-index:0;}
  #cr-root .dot{width:1.0cqw;height:1.0cqw;border-radius:50%;display:block;flex:0 0 auto;}
  #cr-root .dot.r{background:#FF5F57;}#cr-root .dot.y{background:#FEBC2E;}#cr-root .dot.g{background:#28C840;}

  #cr-root .title{position:absolute;top:5cqh;left:0;right:0;z-index:5;display:flex;align-items:center;justify-content:center;gap:.45cqw;height:5.5cqw;}

<script>
(function(){
  const R=(document.currentScript&&document.currentScript.closest('#cr-root'))||document.querySelector('#cr-root');
  if(!R||!window.gsap) return;
  const q=(s)=>R.querySelector(s), qa=(s)=>Array.from(R.querySelectorAll(s));
  window.__timelines=window.__timelines||{};
  const tl=gsap.timeline({paused:true});
  const inner=gsap.timeline();

  const avs=qa('.cr .av'), rings=qa('.cr .ring'), nms=qa('.cr .nm'), rls=qa('.cr .rl');

  gsap.set(q('.pwin'),{opacity:0,scale:.62,y:10});
  gsap.set(q('#cr-pfill'),{scaleX:0.86});
  gsap.set(q('#cr-pknob'),{left:'86%'});
  gsap.set(q('.cl1'),{opacity:0});
  gsap.set(avs,{scale:.55,opacity:0,transformOrigin:'50% 50%'});
  gsap.set(rings,{scale:.5,opacity:0});
  gsap.set([nms,rls].flat(),{opacity:0,y:10});
  gsap.set(qa('.cr .glab'),{opacity:0,y:8});
  gsap.set(q('#cr-path'),{scaleX:0});
  gsap.set(q('#cr-sign'),{opacity:0,y:8});

  // TITLE typewriter
  const TITLE="SHOW YOUR CONTRIBUTOR";
  const tt=q('#cr-ttext'), tc=q('#cr-tcaret');
  tt.textContent=''; gsap.set(tc,{opacity:1});
  const o={n:0};
  inner.to(o,{n:TITLE.length,duration:1.0,ease:'none',onUpdate(){tt.textContent=TITLE.slice(0,Math.round(o.n));}},0.3);
  inner.to(tc,{opacity:0,duration:.4,ease:'steps(1)',repeat:7,yoyo:true},0.3);
  inner.to(tc,{opacity:0,duration:.3,ease:'power2.in'},6.1);

  // player opens
  inner.fromTo(q('.pwin'),{opacity:0,scale:.62,y:10},{opacity:1,scale:1,y:0,duration:.6,ease:'power3.out'},0.15);
  inner.to(q('.cl1'),{opacity:1,duration:.4},1.7);
  // scrubber nudges to the end (scene 6/6 of 0:32)
  inner.to(q('#cr-pfill'),{scaleX:0.98,duration:3.4,ease:'none'},1.9);
  inner.to(q('#cr-pknob'),{left:'98%',duration:3.4,ease:'none'},1.9);
  const t2={t:30};
  inner.to(t2,{t:32,duration:3.4,ease:'none',onUpdate(){q('#cr-ptime').textContent='0:'+String(Math.floor(t2.t)).padStart(2,'0')+' / 0:32';}},1.9);

  // ════════ the roster plays inside the screen ════════
  inner.to(qa('.cr .glab'),{opacity:1,y:0,duration:.4,stagger:.12,ease:'power3.out'},1.95);
  inner.to(q('#cr-path'),{scaleX:1,duration:1.2,ease:'power2.inOut'},2.0);
  avs.forEach((av,i)=>{
    const t=2.05+i*0.16;
    inner.to(av,{scale:1,opacity:1,duration:.45,ease:'back.out(1.7)'},t);
    inner.fromTo(rings[i],{scale:.5,opacity:.6},{scale:1.35,opacity:0,duration:.7,ease:'power2.out'},t);
    inner.to(nms[i],{opacity:1,y:0,duration:.35,ease:'power3.out'},t+.14);
    inner.to(rls[i],{opacity:1,y:0,duration:.35,ease:'power3.out'},t+.24);
  });
  inner.to(q('#cr-sign'),{opacity:1,y:0,duration:.5,ease:'power3.out'},3.9);
  inner.to({},{duration:.3},6.3);

  inner.timeScale(2.54);   // compressed: ~6.6s authored → ~2.6s
  tl.add(inner,0);
  window.__timelines["feature-credits"]=tl;
})();
</script>
