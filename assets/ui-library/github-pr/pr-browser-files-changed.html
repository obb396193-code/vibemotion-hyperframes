<script>
(function(){
  const R=(document.currentScript&&document.currentScript.closest('#prs-root'))||document.querySelector('#prs-root');
  if(!R||!window.gsap) return;
  const br=R.querySelector('.browser'),inner=R.querySelector('#prs-inner'),files=R.querySelector('#prs-filesview'),
        review=R.querySelector('#prs-review'),revs=R.querySelectorAll('#prs-review .rev'),tabs=R.querySelectorAll('#prs-tabs .tab'),
        head=R.querySelector('#prs-head'),s1=R.querySelector('#prs-s1'),s2=R.querySelector('#prs-s2'),s3=R.querySelector('#prs-s3'),
        innerRows=R.querySelector('#prs-inner');
  window.__timelines=window.__timelines||{};
  const tl=gsap.timeline({paused:true});
  // clone file rows so the whip-through never runs dry
  const rows=[...innerRows.children];for(let k=0;k<8;k++){rows.forEach(n=>innerRows.appendChild(n.cloneNode(true)));}
  const reveal=(el,t)=>tl.fromTo(el,{opacity:0,y:14},{opacity:1,y:0,duration:.3,ease:'power3.out'},t);
  const tabOn=(i,t)=>{tl.add(()=>{tabs.forEach(x=>x.classList.remove('on'));tabs[i].classList.add('on');},t);};
  // type a number one char at a time, with a caret that hides when done
  const typeNum=(numSel,carSel,str,t,dur)=>{
    const el=R.querySelector(numSel),car=R.querySelector(carSel),o={p:0};el.textContent='';
    tl.set(car,{opacity:1},t);
    tl.to(o,{p:1,duration:dur,ease:'steps('+str.length+')',onUpdate(){el.textContent=str.slice(0,Math.round(o.p*str.length));}},t);
    tl.to(car,{opacity:0,duration:.25,ease:'steps(1)',repeat:1,yoyo:true},t+dur);
  };

  gsap.set(br,{scale:1.04,opacity:0});gsap.set(inner,{y:0,filter:'blur(0px)'});gsap.set(files,{opacity:0});gsap.set(review,{opacity:1});
  gsap.set([head,s1,s2,s3],{opacity:0});gsap.set(R.querySelectorAll('.ncaret'),{opacity:0});

  // window pulls in (in-frame)
  tl.to(br,{scale:1,opacity:1,duration:.4,ease:'power3.out'},0.0);

  // PHASE A — review section flashes through (tabs flash too)
  tabOn(0,0.25);
  revs.forEach((r,i)=>tl.fromTo(r,{opacity:0,x:16},{opacity:1,x:0,duration:.18,ease:'power2.out'},0.3+i*0.12));
  tabOn(1,0.95);
  // PHASE B — switch to Files changed, whip through the diff
  tabOn(2,1.15);
  tl.to(review,{opacity:0,duration:.2},1.1);
  tl.to(files,{opacity:1,duration:.2},1.15);
  tl.to(inner,{y:-3600,duration:1.7,ease:'power2.in'},1.2);                 // fast whip
  tl.fromTo(inner,{filter:'blur(0px)'},{filter:'blur(2px)',duration:1.1,ease:'power2.in'},1.5);

  // RIGHT — headline + numbers typed one digit at a time (typewriter + caret)
  reveal(head,0.5);
  reveal(s1,1.2); typeNum('#st-files','#cr1','629',1.35,.45);
  reveal(s2,1.75); typeNum('#st-lines','#cr2','87,291',1.9,.7);
  reveal(s3,2.35); typeNum('#st-commits','#cr3','4',2.5,.2);
  tl.to({},{duration:.2},3.0);

})();
